<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Cliente</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.level-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.lbtn{padding:8px 4px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer;text-align:center;}
.lbtn.sel{border-color:var(--acc);background:rgba(0,191,255,.1);color:var(--acc);}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
const params=new URLSearchParams(window.location.search);
const editId=params.get('id');
let selLevel='bronze';
(async()=>{
  const ok=await requireAuth();if(!ok)return;
  let c=null;
  if(editId){const{data}=await sb.from('customers').select('*').eq('id',editId).single();c=data;selLevel=c?.level||'bronze';}
  const v=(f)=>c?.[f]||'';
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="history.back()">←</button>
      <h1>${editId?'Editar Cliente':'Novo Cliente'}</h1>
    </div>
    <div class="fp">
      <div class="fsec" style="margin-top:4px;">Dados pessoais</div>
      <div class="fg"><label class="fl">Nome *</label><input class="fi" id="cn" value="${v('name')}" placeholder="Nome completo"></div>
      <div class="fg"><label class="fl">Empresa</label><input class="fi" id="cc" value="${v('company')}" placeholder="Razão social"></div>
      <div class="fr">
        <div class="fg"><label class="fl">Telefone</label><input class="fi" id="cph" type="tel" value="${v('phone')}" placeholder="(41) 99999-0000"></div>
        <div class="fg"><label class="fl">CPF/CNPJ</label><input class="fi" id="cdoc" value="${v('document')}" placeholder="000.000.000-00" oninput="maskDoc(this)" onblur="validateDoc()"></div>
      </div>
      <div id="docErr"></div>
      <div class="fg"><label class="fl">E-mail</label><input class="fi" id="cem" type="email" value="${v('email')}" placeholder="email@exemplo.com"></div>
      <div class="fsec">Classificação do cliente</div>
      <div class="level-grid" id="levelGrid"></div>
      <div class="fsec">Endereço</div>
      <div class="fr">
        <div class="fg"><label class="fl">CEP</label><input class="fi" id="czip" value="${v('zip_code')}" placeholder="80000-000" oninput="searchCep(this.value)"></div>
        <div class="fg"><label class="fl">UF</label><input class="fi" id="cst" value="${v('state')}" placeholder="PR" maxlength="2"></div>
      </div>
      <div class="fg"><label class="fl">Cidade</label><input class="fi" id="ccity" value="${v('city')}" placeholder="Curitiba"></div>
      <div class="fg"><label class="fl">Bairro</label><input class="fi" id="cdist" value="${v('district')}" placeholder="Bairro"></div>
      <div class="f3">
        <div class="fg"><label class="fl">Rua</label><input class="fi" id="cstr" value="${v('street')}" placeholder="Nome da rua"></div>
        <div class="fg"><label class="fl">Número</label><input class="fi" id="cnum" value="${v('number')}" placeholder="123"></div>
      </div>
      <div class="fg"><label class="fl">Complemento</label><input class="fi" id="ccomp" value="${v('complement')}" placeholder="Apto, bloco..."></div>
      <div class="fsec">Observações</div>
      <div class="fg"><label class="fl">Notas internas</label><textarea class="fta" id="cnotes" placeholder="Histórico, preferências...">${v('notes')}</textarea></div>
      <div id="cErr" style="margin-top:12px;"></div>
      <button class="btn bp" id="savebtn" style="margin-top:16px;" onclick="doSave()">✓ ${editId?'Salvar alterações':'Cadastrar cliente'}</button>
      ${editId?`<button class="btn berr" style="margin-top:10px;" onclick="doDelete()">🗑️ Excluir cliente</button>`:''}
    </div>
  </div>`;
  renderLevels();
})();

function renderLevels(){
  const g=document.getElementById('levelGrid');if(!g)return;
  g.innerHTML=[{v:'bronze',l:'🥉 Bronze'},{v:'silver',l:'🥈 Prata'},{v:'gold',l:'🥇 Ouro'},{v:'vip',l:'💎 VIP'}].map(lv=>`<button class="lbtn ${selLevel===lv.v?'sel':''}" onclick="setLevel('${lv.v}')">${lv.l}</button>`).join('');
}
function setLevel(l){selLevel=l;renderLevels();}

function maskDoc(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length<=11) v=v.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  else v=v.replace(/(\d{2})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2');
  el.value=v;
}
function validateDoc(){
  const raw=document.getElementById('cdoc')?.value.replace(/\D/g,'')||'';
  const err=document.getElementById('docErr');if(!err)return true;
  if(!raw){err.innerHTML='';return true;}
  if(raw.length===11){if(!validCpf(raw)){err.innerHTML='<div class="alert alert-err" style="padding:6px 10px;font-size:11px;margin-top:4px;">CPF inválido</div>';return false;}}
  else if(raw.length===14){if(!validCnpj(raw)){err.innerHTML='<div class="alert alert-err" style="padding:6px 10px;font-size:11px;margin-top:4px;">CNPJ inválido</div>';return false;}}
  else{err.innerHTML='<div class="alert alert-warn" style="padding:6px 10px;font-size:11px;margin-top:4px;">CPF=11 dígitos / CNPJ=14 dígitos</div>';return false;}
  err.innerHTML='';return true;
}
function validCpf(c){if(/^(\d)\1+$/.test(c))return false;let s=0;for(let i=0;i<9;i++)s+=parseInt(c[i])*(10-i);let r=11-(s%11);if(r>=10)r=0;if(r!==parseInt(c[9]))return false;s=0;for(let i=0;i<10;i++)s+=parseInt(c[i])*(11-i);r=11-(s%11);if(r>=10)r=0;return r===parseInt(c[10]);}
function validCnpj(c){if(/^(\d)\1+$/.test(c))return false;const calc=(n,len)=>{let s=0,p=len-7;for(let i=len;i>=1;i--){s+=parseInt(n[len-i])*(p--);if(p<2)p=9;}let r=s%11;return r<2?0:11-r;};return calc(c,12)===parseInt(c[12])&&calc(c,13)===parseInt(c[13]);}
async function searchCep(cep){const clean=cep.replace(/\D/g,'');if(clean.length!==8)return;try{const r=await fetch(`https://viacep.com.br/ws/${clean}/json/`);const d=await r.json();if(d.erro)return;const set=(id,v)=>{const el=document.getElementById(id);if(el&&v)el.value=v;};set('cstr',d.logradouro);set('cdist',d.bairro);set('ccity',d.localidade);set('cst',d.uf);}catch{}}
async function doSave(){
  const name=val('cn');clearErr('cErr');
  if(!name){showErr('cErr','Nome é obrigatório');return;}
  if(!validateDoc())return;
  setBtnLoading('savebtn',true,editId?'Salvar':'Cadastrar');
  const payload={name,company:val('cc'),phone:val('cph'),document:val('cdoc'),email:val('cem'),zip_code:val('czip'),state:val('cst'),city:val('ccity'),district:val('cdist'),street:val('cstr'),number:val('cnum'),complement:val('ccomp'),notes:val('cnotes'),level:selLevel,updated_at:new Date().toISOString()};
  let error,savedId=editId;
  if(editId){const res=await sb.from('customers').update(payload).eq('id',editId);error=res.error;}
  else{payload.owner_id=currentUser.id;payload.created_by_id=currentUser.id;payload.is_active=true;const res=await sb.from('customers').insert([payload]).select('id').single();error=res.error;if(!error)savedId=res.data.id;}
  setBtnLoading('savebtn',false,editId?'Salvar':'Cadastrar');
  if(error){showErr('cErr','Erro: '+error.message);return;}
  toast('Cliente salvo!','ok');
  setTimeout(()=>nav(`cliente-detalhe.html?id=${savedId}`),800);
}
async function doDelete(){
  if(!confirm('Excluir este cliente?'))return;
  await sb.from('customers').update({is_active:false}).eq('id',editId);
  toast('Cliente excluído','ok');
  setTimeout(()=>nav('clientes.html'),800);
}
</script>
</body>
</html>

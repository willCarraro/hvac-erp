<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>ARCLASS — Novo Cliente</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
// Parâmetros da URL (para edição futura)
const params  = new URLSearchParams(window.location.search);
const editId  = params.get('id');

(async () => {
  const ok = await requireAuth();
  if (!ok) return;

  let customer = null;
  if (editId) {
    const { data } = await sb.from('customers').select('*').eq('id', editId).single();
    customer = data;
  }

  const v = (field) => customer?.[field] || '';

  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="nav('clientes.html')">←</button>
      <h1>${editId ? 'Editar Cliente' : 'Novo Cliente'}</h1>
    </div>
    <div class="fp">

      <div class="fsec">Dados pessoais</div>

      <div class="fg">
        <label class="fl">Nome completo *</label>
        <input class="fi" id="cn" type="text" placeholder="Nome do cliente" value="${v('name')}">
      </div>
      <div class="fg">
        <label class="fl">Empresa / Razão social</label>
        <input class="fi" id="cc" type="text" placeholder="Opcional" value="${v('company')}">
      </div>
      <div class="fr">
        <div class="fg">
          <label class="fl">Telefone</label>
          <input class="fi" id="cph" type="tel" placeholder="(41) 99999-0000" value="${v('phone')}">
        </div>
        <div class="fg">
          <label class="fl">CPF / CNPJ</label>
          <input class="fi" id="cdoc" placeholder="000.000.000-00" value="${v('document')}">
        </div>
      </div>
      <div class="fg">
        <label class="fl">E-mail</label>
        <input class="fi" id="cem" type="email" placeholder="cliente@email.com" value="${v('email')}">
      </div>

      <div class="fsec">Endereço</div>

      <div class="fr">
        <div class="fg">
          <label class="fl">CEP</label>
          <input class="fi" id="czip" placeholder="80000-000" value="${v('zip_code')}" oninput="searchCep(this.value)">
        </div>
        <div class="fg">
          <label class="fl">Estado</label>
          <input class="fi" id="cst" placeholder="PR" maxlength="2" value="${v('state')}">
        </div>
      </div>
      <div class="fg">
        <label class="fl">Cidade</label>
        <input class="fi" id="ccity" placeholder="Curitiba" value="${v('city')}">
      </div>
      <div class="fg">
        <label class="fl">Bairro</label>
        <input class="fi" id="cdist" placeholder="Bairro" value="${v('district')}">
      </div>
      <div class="f3">
        <div class="fg">
          <label class="fl">Rua / Avenida</label>
          <input class="fi" id="cstr" placeholder="Nome da rua" value="${v('street')}">
        </div>
        <div class="fg">
          <label class="fl">Número</label>
          <input class="fi" id="cnum" placeholder="123" value="${v('number')}">
        </div>
      </div>
      <div class="fg">
        <label class="fl">Complemento</label>
        <input class="fi" id="ccomp" placeholder="Apto, bloco, etc." value="${v('complement')}">
      </div>

      <div class="fsec">Observações</div>

      <div class="fg">
        <label class="fl">Notas internas</label>
        <textarea class="fta" id="cnotes" placeholder="Observações sobre o cliente, preferências, histórico...">${v('notes')}</textarea>
      </div>

      <div id="cErr" style="margin-top:12px;"></div>

      <button class="btn bp" id="savebtn" style="margin-top:16px;" onclick="doSave()">
        ✓ ${editId ? 'Salvar alterações' : 'Cadastrar cliente'}
      </button>
      ${editId ? `<button class="btn bs" style="margin-top:10px;" onclick="nav('cliente-detalhe.html?id=${editId}')">Cancelar</button>` : ''}
    </div>
  </div>`;
})();

// Busca CEP automaticamente
async function searchCep(cep) {
  const clean = cep.replace(/\D/g, '');
  if (clean.length !== 8) return;
  try {
    const r = await fetch(`https://viacep.com.br/ws/${clean}/json/`);
    const d = await r.json();
    if (d.erro) return;
    const set = (id, v) => { const el = document.getElementById(id); if (el && v) el.value = v; };
    set('cstr',  d.logradouro);
    set('cdist', d.bairro);
    set('ccity', d.localidade);
    set('cst',   d.uf);
  } catch {}
}

async function doSave() {
  const name = val('cn');
  clearErr('cErr');
  if (!name) { showErr('cErr', 'Nome é obrigatório'); return; }

  setBtnLoading('savebtn', true, editId ? 'Salvar alterações' : 'Cadastrar cliente');

  const payload = {
    name,
    company:    val('cc'),
    phone:      val('cph'),
    document:   val('cdoc'),
    email:      val('cem'),
    zip_code:   val('czip'),
    state:      val('cst'),
    city:       val('ccity'),
    district:   val('cdist'),
    street:     val('cstr'),
    number:     val('cnum'),
    complement: val('ccomp'),
    notes:      val('cnotes'),
    updated_at: new Date().toISOString(),
  };

  let error;
  let savedId = editId;

  if (editId) {
    const res = await sb.from('customers').update(payload).eq('id', editId);
    error = res.error;
  } else {
    payload.created_by_id = currentUser.id;
    payload.is_active = true;
    const res = await sb.from('customers').insert([payload]).select('id').single();
    error = res.error;
    if (!error) savedId = res.data.id;
  }

  setBtnLoading('savebtn', false, editId ? 'Salvar alterações' : 'Cadastrar cliente');

  if (error) {
    showErr('cErr', 'Erro ao salvar: ' + error.message);
    return;
  }

  toast('Cliente salvo com sucesso!', 'ok');
  setTimeout(() => nav(`cliente-detalhe.html?id=${savedId}`), 800);
}
</script>
</body>
</html>

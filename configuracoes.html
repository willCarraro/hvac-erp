<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"><meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923"><title>MeuGestHVAC — Configurações</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.cfg-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.cfg-tab{flex:1;padding:10px;border:none;background:none;color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;}
.cfg-tab.on{color:var(--acc);border-bottom-color:var(--acc);}
</style>
</head>
<body><div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
let cfgTab = 'empresa';

(async()=>{
  const ok = await requireAuth(); if(!ok) return;
  draw();
})();

function draw(){
  const c = financeConfig || {};
  const co = userCompany || {};

  const cfgRow = (label, field, unit) => `
    <div class="cfg-row">
      <span class="cfg-label">${label}</span>
      <div style="display:flex;align-items:center;gap:4px;">
        <span class="cfg-unit">${unit}</span>
        <input class="cfg-input" id="f_${field}" type="number" step="0.01" min="0" value="${c[field]||0}">
      </div>
    </div>`;

  const alertRow = (label, field) => `
    <div class="cfg-row">
      <span class="cfg-label">${label}</span>
      <div style="display:flex;align-items:center;gap:4px;">
        <span class="cfg-unit">dias</span>
        <input class="cfg-input" id="f_${field}" type="number" step="1" min="0" value="${c[field]||0}">
      </div>
    </div>`;

  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="hdr"><h1>⚙️ Configurações</h1></div>
    <div class="cfg-tabs">
      <button class="cfg-tab ${cfgTab==='empresa'?'on':''}" onclick="setCfgTab('empresa')">Empresa</button>
      <button class="cfg-tab ${cfgTab==='financeiro'?'on':''}" onclick="setCfgTab('financeiro')">Financeiro</button>
      <button class="cfg-tab ${cfgTab==='alertas'?'on':''}" onclick="setCfgTab('alertas')">Alertas</button>
      <button class="cfg-tab ${cfgTab==='conta'?'on':''}" onclick="setCfgTab('conta')">Conta</button>
    </div>
    <div style="padding:14px;">
      ${cfgTab==='empresa' ? `
        <div class="card">
          <div class="card-title">🏢 Dados da sua empresa</div>
          <div class="fg"><label class="fl">Nome da empresa *</label><input class="fi" id="co_name" value="${co.company_name||''}" placeholder="Nome da empresa"></div>
          <div class="fg" style="margin-top:8px;"><label class="fl">CNPJ / CPF</label><input class="fi" id="co_cnpj" value="${co.cnpj||''}" placeholder="00.000.000/0000-00"></div>
          <div class="fr" style="margin-top:8px;">
            <div class="fg"><label class="fl">Telefone</label><input class="fi" id="co_phone" type="tel" value="${co.phone||''}" placeholder="(41) 99999-0000"></div>
            <div class="fg"><label class="fl">Cidade</label><input class="fi" id="co_city" value="${co.city||''}" placeholder="Curitiba"></div>
          </div>
          <div class="fg" style="margin-top:8px;"><label class="fl">Endereço</label><input class="fi" id="co_address" value="${co.address||''}" placeholder="Rua, número, bairro"></div>
          <div class="fg" style="margin-top:8px;"><label class="fl">E-mail</label><input class="fi" id="co_email" type="email" value="${co.email||''}" placeholder="contato@empresa.com"></div>
          <div id="coErr" style="margin-top:8px;"></div>
          <button class="btn bp" id="coSave" style="margin-top:12px;" onclick="saveCompany()">✓ Salvar dados da empresa</button>
        </div>` : ''}

      ${cfgTab==='financeiro' ? `
        <div class="card">
          <div class="card-title">💰 Valores base</div>
          ${cfgRow('Taxa hora técnica','hourly_rate','R$')}
          ${cfgRow('Taxa de visita','visit_fee','R$')}
          ${cfgRow('Piso mínimo corretiva','min_corrective_fee','R$')}
        </div>
        <div class="card" style="margin-top:10px;">
          <div class="card-title">📊 Margens de lucro</div>
          ${cfgRow('Margem material','material_margin','%')}
          ${cfgRow('Margem gás / nitrogênio','gas_margin','%')}
          ${cfgRow('Margem peças','parts_margin','%')}
          ${cfgRow('Adicional urgência','urgency_surcharge','%')}
        </div>
        <div class="card" style="margin-top:10px;">
          <div class="card-title">⚡ Multiplicadores de dificuldade</div>
          ${cfgRow('Fácil','mult_easy','×')}
          ${cfgRow('Médio','mult_medium','×')}
          ${cfgRow('Difícil','mult_hard','×')}
        </div>
        <div class="card" style="margin-top:10px;">
          <div class="card-title">🛡️ Preços base preventiva</div>
          ${cfgRow('Hi Wall (por unidade)','hiwall_base','R$')}
          ${cfgRow('Piso Teto (por unidade)','pisoteto_base','R$')}
          ${cfgRow('Cassete (por unidade)','cassete_base','R$')}
        </div>
        <div id="finErr" style="margin-top:8px;"></div>
        <button class="btn bp" id="finSave" style="margin-top:12px;" onclick="saveFinance()">✓ Salvar parâmetros</button>` : ''}

      ${cfgTab==='alertas' ? `
        <div class="card">
          <div class="card-title">🔔 Prazos de alerta</div>
          <div style="font-size:12px;color:var(--txt2);margin-bottom:10px;">Define quantos dias antes o sistema avisa você</div>
          ${alertRow('Orçamento parado (rascunho)','quote_draft_alert_days')}
          ${alertRow('Orçamento sem resposta (enviado)','quote_sent_alert_days')}
          ${alertRow('Orçamento aprovado sem agendar','quote_approved_alert_days')}
          ${alertRow('Conta a receber prestes a vencer','receivable_due_alert_days')}
          ${alertRow('Conta a pagar prestes a vencer','payable_due_alert_days')}
          <div id="alertErr" style="margin-top:8px;"></div>
          <button class="btn bp" id="alertSave" style="margin-top:12px;" onclick="saveFinance()">✓ Salvar alertas</button>
        </div>
        <div class="card" style="margin-top:10px;">
          <div class="card-title" style="margin-bottom:8px;">📋 Regras ativas</div>
          ${[
            {ico:'📝',l:'Orçamento em rascunho parado'},
            {ico:'📤',l:'Orçamento enviado sem resposta'},
            {ico:'✅',l:'Orçamento aprovado sem agendar'},
            {ico:'💰',l:'Conta a receber vencendo'},
            {ico:'💳',l:'Conta a pagar vencendo'},
            {ico:'📅',l:'Lembrete de agenda (próximo dia)'},
            {ico:'⚠️',l:'Cliente com 2+ contas em aberto'},
          ].map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px;"><span style="font-size:16px;">${r.ico}</span><span style="flex:1;">${r.l}</span><span style="color:var(--ok);font-weight:700;font-size:11px;">ATIVO</span></div>`).join('')}
        </div>` : ''}

      ${cfgTab==='conta' ? `
        <div class="card">
          <div class="card-title">👤 Dados da conta</div>
          <div class="drow"><span class="dlbl">Nome</span><span class="dval">${userProfile?.full_name||'—'}</span></div>
          <div class="drow"><span class="dlbl">E-mail</span><span class="dval">${currentUser?.email||'—'}</span></div>
          <div class="drow"><span class="dlbl">Perfil</span><span class="dval">${userProfile?.role?.toUpperCase()||'ADM'}</span></div>
        </div>
        <div class="card" style="margin-top:10px;">
          <div class="card-title">🔑 Alterar senha</div>
          <div class="fg"><label class="fl">Nova senha (mín. 6 caracteres)</label><input class="fi" id="newPwd" type="password" placeholder="••••••••"></div>
          <div class="fg" style="margin-top:8px;"><label class="fl">Confirmar nova senha</label><input class="fi" id="confPwd" type="password" placeholder="••••••••"></div>
          <div id="pwdErr" style="margin-top:8px;"></div>
          <button class="btn bp" id="pwdSave" style="margin-top:12px;" onclick="changePassword()">🔑 Atualizar senha</button>
        </div>
        <div class="card" style="margin-top:10px;border-color:var(--err);cursor:pointer;" onclick="if(confirm('Deseja sair?'))signOut()">
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:22px;">🚪</span>
            <div><div style="font-weight:600;color:var(--err);">Sair da conta</div><div style="font-size:12px;color:var(--txt2);">${currentUser?.email}</div></div>
          </div>
        </div>
        <p style="text-align:center;font-size:11px;color:var(--txt2);opacity:.4;margin-top:20px;">MeuGestHVAC · Sistema de Gestão HVAC</p>` : ''}
    </div>
  </div>
  ${renderNav('config')}`;
}

function setCfgTab(t){ cfgTab=t; draw(); }

async function saveCompany(){
  setBtnLoading('coSave',true,'Salvar dados da empresa');
  const{error}=await sb.from('user_company').upsert([{
    user_id:currentUser.id,
    company_name:val('co_name')||'',cnpj:val('co_cnpj'),
    phone:val('co_phone'),city:val('co_city'),
    address:val('co_address'),email:val('co_email'),
    updated_at:new Date().toISOString(),
  }]);
  setBtnLoading('coSave',false,'Salvar dados da empresa');
  if(error){showErr('coErr','Erro: '+error.message);return;}
  toast('Dados da empresa salvos!','ok');
  await loadCompany();
}

async function saveFinance(){
  const btnId = cfgTab==='alertas'?'alertSave':'finSave';
  const errId = cfgTab==='alertas'?'alertErr':'finErr';
  setBtnLoading(btnId,true,'Salvar');
  const fields=['hourly_rate','visit_fee','min_corrective_fee','material_margin','gas_margin','parts_margin','urgency_surcharge','mult_easy','mult_medium','mult_hard','hiwall_base','pisoteto_base','cassete_base','quote_draft_alert_days','quote_sent_alert_days','quote_approved_alert_days','receivable_due_alert_days','payable_due_alert_days'];
  const upd={user_id:currentUser.id,updated_at:new Date().toISOString()};
  fields.forEach(f=>{const el=document.getElementById('f_'+f);if(el)upd[f]=parseFloat(el.value)||0;});
  const{error}=await sb.from('user_finance_config').upsert([upd]);
  setBtnLoading(btnId,false,'Salvar');
  if(error){showErr(errId,'Erro: '+error.message);return;}
  financeConfig={...financeConfig,...upd};
  toast('Configurações salvas!','ok');
}

async function changePassword(){
  const p=document.getElementById('newPwd')?.value;
  const p2=document.getElementById('confPwd')?.value;
  clearErr('pwdErr');
  if(!p||p.length<6){showErr('pwdErr','Senha deve ter no mínimo 6 caracteres');return;}
  if(p!==p2){showErr('pwdErr','As senhas não coincidem');return;}
  setBtnLoading('pwdSave',true,'Atualizar senha');
  const{error}=await sb.auth.updateUser({password:p});
  setBtnLoading('pwdSave',false,'Atualizar senha');
  if(error){showErr('pwdErr','Erro: '+error.message);return;}
  toast('Senha atualizada com sucesso!','ok');
  document.getElementById('newPwd').value='';
  document.getElementById('confPwd').value='';
}
</script>
</body>
</html>

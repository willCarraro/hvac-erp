<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>ARCLASS — Configurações</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
(async () => {
  const ok = await requireAuth();
  if (!ok) return;

  const cfg = financeConfig || {};
  const { data: co } = await sb.from('company_config').select('*').single();

  const cfgRow = (label, field, unit) => `
    <div class="cfg-row">
      <span class="cfg-label">${label}</span>
      <div style="display:flex;align-items:center;gap:4px;">
        <span class="cfg-unit">${unit}</span>
        <input class="cfg-input" id="f_${field}" type="number" step="0.01" min="0" value="${cfg[field] || 0}">
      </div>
    </div>`;

  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="hdr"><h1>⚙️ Configurações</h1></div>
    <div style="padding:14px;">

      <!-- Empresa -->
      <div class="card" style="margin-bottom:10px;">
        <div class="card-title">🏢 Dados da empresa</div>
        <div class="drow"><span class="dlbl">Nome</span><span class="dval">${co?.name || 'ARCLASS CLIMATIZAÇÃO'}</span></div>
        <div class="drow"><span class="dlbl">Cidade</span><span class="dval">Curitiba / PR</span></div>
        <div class="drow"><span class="dlbl">Usuário</span><span class="dval">${userProfile?.full_name || currentUser?.email}</span></div>
        <div class="drow"><span class="dlbl">Perfil</span><span class="dval">${userProfile?.role?.toUpperCase() || 'ADM'}</span></div>
      </div>

      <!-- Links rápidos -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div class="card" style="cursor:pointer;text-align:center;" onclick="nav('clientes.html')">
          <div style="font-size:22px;margin-bottom:6px;">👥</div>
          <div style="font-size:13px;font-weight:600;">Clientes</div>
        </div>
        <div class="card" style="cursor:pointer;text-align:center;" onclick="nav('orcamentos.html')">
          <div style="font-size:22px;margin-bottom:6px;">📋</div>
          <div style="font-size:13px;font-weight:600;">Orçamentos</div>
        </div>
      </div>

      <!-- Parâmetros financeiros -->
      <div class="card">
        <div class="card-title">💰 Parâmetros financeiros</div>
        ${cfgRow('Taxa hora técnica',  'hourly_rate',        'R$')}
        ${cfgRow('Taxa de visita',     'visit_fee',          'R$')}
        ${cfgRow('Piso corretiva',     'min_corrective_fee', 'R$')}
        ${cfgRow('Margem material',    'material_margin',    '%')}
        ${cfgRow('Margem gás',         'gas_margin',         '%')}
        ${cfgRow('Margem peças',       'parts_margin',       '%')}
        ${cfgRow('Adicional urgência', 'urgency_surcharge',  '%')}
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);">
          <div style="font-size:11px;color:var(--txt2);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">Multiplicadores de dificuldade</div>
          ${cfgRow('Fácil',   'mult_easy',   '×')}
          ${cfgRow('Médio',   'mult_medium', '×')}
          ${cfgRow('Difícil', 'mult_hard',   '×')}
        </div>
        <div id="cfgErr" style="margin-top:10px;"></div>
        <button class="btn bp" id="savecfg" style="margin-top:12px;" onclick="saveCfg()">✓ Salvar parâmetros</button>
      </div>

      <!-- Sair -->
      <div class="card" style="margin-top:10px;border-color:var(--err);cursor:pointer;" onclick="doSignOut()">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:22px;">🚪</span>
          <div>
            <div style="font-weight:600;color:var(--err);">Sair da conta</div>
            <div style="font-size:12px;color:var(--txt2);">${currentUser?.email}</div>
          </div>
        </div>
      </div>

      <p style="text-align:center;font-size:11px;color:var(--txt2);opacity:.5;margin-top:20px;">
        ARCLASS HVAC ERP · Curitiba/PR
      </p>
    </div>
  </div>
  ${renderNav('config')}`;
})();

async function saveCfg() {
  clearErr('cfgErr');
  setBtnLoading('savecfg', true, 'Salvar parâmetros');

  const fields = ['hourly_rate','visit_fee','min_corrective_fee','material_margin','gas_margin','parts_margin','urgency_surcharge','mult_easy','mult_medium','mult_hard'];
  const upd = { updated_at: new Date().toISOString() };
  fields.forEach(f => {
    const el = document.getElementById('f_' + f);
    if (el) upd[f] = parseFloat(el.value) || 0;
  });

  const { error } = await sb.from('finance_config').update(upd).eq('id', 1);
  setBtnLoading('savecfg', false, 'Salvar parâmetros');

  if (error) { showErr('cfgErr', 'Erro ao salvar: ' + error.message); return; }
  financeConfig = { ...financeConfig, ...upd };
  toast('Configurações salvas!', 'ok');
}

function doSignOut() {
  if (confirm('Deseja sair da conta?')) signOut();
}
</script>
</body>
</html>

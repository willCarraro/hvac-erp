<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Configurações</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.cfg-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.cfg-tab{flex:1;padding:9px;border:none;background:none;color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.cfg-tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.day-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.day-btn{padding:8px 4px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg3);color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer;text-align:center;}
.day-btn.sel{border-color:var(--acc);background:rgba(0,191,255,.1);color:var(--acc);}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
let cfgTab='empresa';
let workDays={mon:true,tue:true,wed:true,thu:true,fri:true,sat:false,sun:false};

(async()=>{
  const ok=await requireAuth();if(!ok)return;
  const cfg=financeConfig||{};
  workDays={
    mon:cfg.work_mon??true,tue:cfg.work_tue??true,wed:cfg.work_wed??true,
    thu:cfg.work_thu??true,fri:cfg.work_fri??true,
    sat:cfg.work_sat??false,sun:cfg.work_sun??false
  };
  draw();
})();

function draw(){
  const c=financeConfig||{}, co=userCompany||{};
  const cfgRow=(lbl,fld,unit)=>`
    <div class="cfg-row"><span class="cfg-label">${lbl}</span>
      <div style="display:flex;align-items:center;gap:4px;"><span class="cfg-unit">${unit}</span>
        <input class="cfg-input" id="f_${fld}" type="number" step="0.01" min="0" value="${c[fld]!=null?c[fld]:0}">
      </div></div>`;
  const alertRow=(lbl,fld)=>`
    <div class="cfg-row"><span class="cfg-label">${lbl}</span>
      <div style="display:flex;align-items:center;gap:4px;"><span class="cfg-unit">dias</span>
        <input class="cfg-input" id="f_${fld}" type="number" step="1" min="0" value="${c[fld]!=null?c[fld]:0}">
      </div></div>`;

  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr"><h1>⚙️ Configurações</h1></div>
    <div class="cfg-tabs">
      <button class="cfg-tab ${cfgTab==='empresa'?'on':''}"     onclick="setCfgTab('empresa')">Empresa</button>
      <button class="cfg-tab ${cfgTab==='financeiro'?'on':''}"  onclick="setCfgTab('financeiro')">Financeiro</button>
      <button class="cfg-tab ${cfgTab==='horario'?'on':''}"     onclick="setCfgTab('horario')">Horário</button>
      <button class="cfg-tab ${cfgTab==='alertas'?'on':''}"     onclick="setCfgTab('alertas')">Alertas</button>
      <button class="cfg-tab ${cfgTab==='conta'?'on':''}"       onclick="setCfgTab('conta')">Conta</button>
    </div>
    <div style="padding:14px;">
      ${cfgTab==='empresa'?`
        <div class="card">
          <div class="card-title">🏢 Dados da empresa</div>
          <div class="fg"><label class="fl">Nome da empresa *</label><input class="fi" id="co_name" value="${co.company_name||''}" placeholder="Nome da empresa"></div>
          <div class="fg" style="margin-top:8px;"><label class="fl">CNPJ / CPF</label><input class="fi" id="co_cnpj" value="${co.cnpj||''}" placeholder="00.000.000/0000-00"></div>
          <div class="fr" style="margin-top:8px;">
            <div class="fg"><label class="fl">Telefone</label><input class="fi" id="co_phone" type="tel" value="${co.phone||''}" placeholder="(41) 99999-0000"></div>
            <div class="fg"><label class="fl">Cidade</label><input class="fi" id="co_city" value="${co.city||''}" placeholder="Curitiba"></div>
          </div>
          <div class="fg" style="margin-top:8px;"><label class="fl">Endereço</label><input class="fi" id="co_address" value="${co.address||''}" placeholder="Rua, número, bairro"></div>
          <div class="fg" style="margin-top:8px;"><label class="fl">E-mail</label><input class="fi" id="co_email" type="email" value="${co.email||''}" placeholder="contato@empresa.com"></div>
          <div id="coErr" style="margin-top:8px;"></div>
          <button class="btn bp" id="coSave" style="margin-top:12px;" onclick="saveCompany()">✓ Salvar empresa</button>
        </div>`:''}
      ${cfgTab==='financeiro'?`
        <div class="card"><div class="card-title">💰 Valores base</div>
          ${cfgRow('Taxa hora técnica','hourly_rate','R$')}
          ${cfgRow('Taxa de visita','visit_fee','R$')}
          ${cfgRow('Piso mínimo corretiva','min_corrective_fee','R$')}
        </div>
        <div class="card" style="margin-top:10px;"><div class="card-title">📊 Margens</div>
          ${cfgRow('Material','material_margin','%')}
          ${cfgRow('Gás / nitrogênio','gas_margin','%')}
          ${cfgRow('Peças','parts_margin','%')}
          ${cfgRow('Urgência','urgency_surcharge','%')}
        </div>
        <div class="card" style="margin-top:10px;"><div class="card-title">⚡ Multiplicadores</div>
          ${cfgRow('Fácil','mult_easy','×')}
          ${cfgRow('Médio','mult_medium','×')}
          ${cfgRow('Difícil','mult_hard','×')}
        </div>
        <div class="card" style="margin-top:10px;"><div class="card-title">🛡️ Preços preventiva</div>
          ${cfgRow('Hi Wall','hiwall_base','R$')}
          ${cfgRow('Piso Teto','pisoteto_base','R$')}
          ${cfgRow('Cassete','cassete_base','R$')}
        </div>
        <div id="finErr" style="margin-top:8px;"></div>
        <button class="btn bp" id="finSave" style="margin-top:12px;" onclick="saveFinance('finErr','finSave')">✓ Salvar financeiro</button>`:''}
      ${cfgTab==='horario'?`
        <div class="card">
          <div class="card-title">⏰ Horário de trabalho</div>
          <div style="font-size:12px;color:var(--txt2);margin-bottom:12px;">Define quando a agenda aceita agendamentos automáticos</div>
          <div class="fr">
            <div class="fg"><label class="fl">Início (hora)</label>
              <input class="fi" id="f_work_start_hour" type="number" value="${c.work_start_hour??8}" min="0" max="23" step="1"></div>
            <div class="fg"><label class="fl">Fim padrão (hora)</label>
              <input class="fi" id="f_work_end_hour" type="number" value="${c.work_end_hour??18}" min="0" max="23" step="1"></div>
          </div>
          <div class="fg" style="margin-top:8px;"><label class="fl">Fim sexta-feira (hora)</label>
            <input class="fi" id="f_work_end_fri" type="number" value="${c.work_end_fri??17}" min="0" max="23" step="1"></div>
        </div>
        <div class="card" style="margin-top:10px;">
          <div class="card-title">📅 Dias de trabalho</div>
          <div style="font-size:12px;color:var(--txt2);margin-bottom:10px;">Dias marcados são considerados dias úteis pelo sistema</div>
          <div class="day-grid">
            ${[{k:'mon',l:'Seg'},{k:'tue',l:'Ter'},{k:'wed',l:'Qua'},{k:'thu',l:'Qui'},{k:'fri',l:'Sex'},{k:'sat',l:'Sáb'},{k:'sun',l:'Dom'}]
              .map(d=>`<button class="day-btn ${workDays[d.k]?'sel':''}" onclick="toggleDay('${d.k}')">${d.l}</button>`).join('')}
          </div>
          <div style="font-size:11px;color:var(--txt2);margin-top:10px;">Sábado ou domingo marcados viram dias úteis. Feriados nacionais sempre ficam fora.</div>
        </div>
        <div id="horErr" style="margin-top:8px;"></div>
        <button class="btn bp" id="horSave" style="margin-top:12px;" onclick="saveHorario()">✓ Salvar horário</button>`:''}
      ${cfgTab==='alertas'?`
        <div class="card"><div class="card-title">🔔 Prazos de alerta</div>
          ${alertRow('Orçamento parado (rascunho)','quote_draft_alert_days')}
          ${alertRow('Orçamento sem resposta (enviado)','quote_sent_alert_days')}
          ${alertRow('Orçamento aprovado sem agendar','quote_approved_alert_days')}
          ${alertRow('Conta a receber vencendo','receivable_due_alert_days')}
          ${alertRow('Conta a pagar vencendo','payable_due_alert_days')}
          <div id="alertErr" style="margin-top:8px;"></div>
          <button class="btn bp" id="alertSave" style="margin-top:12px;" onclick="saveFinance('alertErr','alertSave')">✓ Salvar alertas</button>
        </div>`:''}
      ${cfgTab==='conta'?`
        <div class="card"><div class="card-title">👤 Conta</div>
          <div class="drow"><span class="dlbl">Nome</span><span class="dval">${userProfile?.full_name||'—'}</span></div>
          <div class="drow"><span class="dlbl">E-mail</span><span class="dval">${currentUser?.email||'—'}</span></div>
        </div>
        <div class="card" style="margin-top:10px;"><div class="card-title">🔑 Alterar senha</div>
          <div class="fg"><label class="fl">Nova senha</label><input class="fi" id="newPwd" type="password" placeholder="mín. 6 caracteres"></div>
          <div class="fg" style="margin-top:8px;"><label class="fl">Confirmar</label><input class="fi" id="confPwd" type="password" placeholder="repetir"></div>
          <div id="pwdErr" style="margin-top:8px;"></div>
          <button class="btn bp" id="pwdSave" style="margin-top:12px;" onclick="changePassword()">🔑 Atualizar senha</button>
        </div>
        <div class="card" style="margin-top:10px;border-color:var(--err);cursor:pointer;" onclick="if(confirm('Sair?'))signOut()">
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:22px;">🚪</span>
            <div><div style="font-weight:600;color:var(--err);">Sair da conta</div><div style="font-size:12px;color:var(--txt2);">${currentUser?.email}</div></div>
          </div>
        </div>
        <p style="text-align:center;font-size:11px;color:var(--txt2);opacity:.4;margin-top:20px;">MeuGestHVAC</p>`:''}
    </div>
  </div>
  ${renderNav('config')}`;
}

function setCfgTab(t){cfgTab=t;draw();}
function toggleDay(k){workDays[k]=!workDays[k];draw();}

async function saveCompany(){
  setBtnLoading('coSave',true,'Salvar empresa');clearErr('coErr');
  const{error}=await sb.from('user_company').upsert([{
    user_id:currentUser.id,company_name:val('co_name')||'',cnpj:val('co_cnpj'),
    phone:val('co_phone'),city:val('co_city'),address:val('co_address'),email:val('co_email'),
    updated_at:new Date().toISOString(),
  }],{onConflict:'user_id'});
  setBtnLoading('coSave',false,'Salvar empresa');
  if(error){showErr('coErr','Erro: '+error.message);return;}
  toast('Empresa salva!','ok');userCompany={...userCompany,company_name:val('co_name')};
}

async function saveFinance(errId,btnId){
  clearErr(errId);setBtnLoading(btnId,true,'Salvar');
  const fields=['hourly_rate','visit_fee','min_corrective_fee','material_margin','gas_margin','parts_margin',
    'urgency_surcharge','mult_easy','mult_medium','mult_hard','hiwall_base','pisoteto_base','cassete_base',
    'quote_draft_alert_days','quote_sent_alert_days','quote_approved_alert_days','receivable_due_alert_days','payable_due_alert_days'];
  const upd={user_id:currentUser.id,updated_at:new Date().toISOString()};
  fields.forEach(f=>{const el=document.getElementById('f_'+f);if(el)upd[f]=parseFloat(el.value)||0;});
  const{error}=await sb.from('user_finance_config').upsert([upd],{onConflict:'user_id'});
  setBtnLoading(btnId,false,'Salvar');
  if(error){showErr(errId,'Erro: '+error.message);return;}
  financeConfig={...financeConfig,...upd};toast('Configurações salvas!','ok');
}

async function saveHorario(){
  clearErr('horErr');setBtnLoading('horSave',true,'Salvar horário');
  const upd={
    user_id:currentUser.id,
    work_start_hour:parseInt(document.getElementById('f_work_start_hour')?.value)||8,
    work_end_hour:parseInt(document.getElementById('f_work_end_hour')?.value)||18,
    work_end_fri:parseInt(document.getElementById('f_work_end_fri')?.value)||17,
    work_sat:workDays.sat,work_sun:workDays.sun,
    updated_at:new Date().toISOString(),
  };
  const{error}=await sb.from('user_finance_config').upsert([upd],{onConflict:'user_id'});
  setBtnLoading('horSave',false,'Salvar horário');
  if(error){showErr('horErr','Erro: '+error.message);return;}
  financeConfig={...financeConfig,...upd};toast('Horário salvo!','ok');
}

async function changePassword(){
  const p=document.getElementById('newPwd')?.value,p2=document.getElementById('confPwd')?.value;
  clearErr('pwdErr');
  if(!p||p.length<6){showErr('pwdErr','Senha deve ter no mínimo 6 caracteres');return;}
  if(p!==p2){showErr('pwdErr','As senhas não coincidem');return;}
  setBtnLoading('pwdSave',true,'Atualizar');
  const{error}=await sb.auth.updateUser({password:p});
  setBtnLoading('pwdSave',false,'Atualizar');
  if(error){showErr('pwdErr','Erro: '+error.message);return;}
  toast('Senha atualizada!','ok');
  document.getElementById('newPwd').value='';document.getElementById('confPwd').value='';
}
</script>
</body>
</html>

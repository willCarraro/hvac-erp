<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Logs</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.log-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.log-action{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.la-deleted{background:rgba(231,76,60,.15);color:var(--err);}
.la-archived{background:rgba(155,89,182,.15);color:#9B59B6;}
.la-status_change{background:rgba(0,191,255,.15);color:var(--acc);}
.la-other{background:rgba(143,163,177,.15);color:var(--txt2);}
.log-desc{font-size:13px;color:var(--txt);margin-bottom:4px;}
.log-time{font-size:11px;color:var(--txt2);}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
(async()=>{
  const ok=await requireAuth();if(!ok)return;
  const{data:logs}=await sb.from('system_logs').select('*').eq('owner_id',currentUser.id).order('created_at',{ascending:false}).limit(200);
  const actionLabel={deleted:'🗑️ Excluído',archived:'📦 Arquivado',status_change:'🔄 Status'};
  const actionCls={deleted:'la-deleted',archived:'la-archived',status_change:'la-status_change'};
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="history.back()">←</button>
      <h1>📋 Logs do sistema</h1>
    </div>
    <div style="padding:10px 14px 4px;font-size:12px;color:var(--txt2);">
      Registro de ações realizadas no sistema (orçamentos excluídos, status alterados, etc.)
    </div>
    <div style="padding:10px 14px 80px;">
      ${logs?.length?logs.map(l=>`
        <div class="log-item">
          <span class="log-action ${actionCls[l.action]||'la-other'}">${actionLabel[l.action]||l.action}</span>
          <div class="log-desc">${l.description||'—'}</div>
          <div class="log-time">${fdatetime(l.created_at)} · ${l.entity}${l.entity_id?' #'+l.entity_id:''}</div>
        </div>`).join(''):
        '<div class="empty"><div class="eico">📋</div><h3>Nenhum log</h3><p>As ações do sistema aparecerão aqui</p></div>'}
    </div>
  </div>`;
})();
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1923"/>
      <stop offset="100%" style="stop-color:#1A2535"/>
    </linearGradient>
    <linearGradient id="accGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="100%" style="stop-color:#0080CC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="14" fill="url(#bgGrad)"/>
  <rect width="400" height="120" rx="14" fill="none" stroke="#2D3F55" stroke-width="1.5"/>

  <!-- Icon: snowflake + gear hybrid -->
  <g transform="translate(28, 60)" filter="url(#glow)">
    <!-- Snowflake arms -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke="url(#accGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke="url(#accGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="url(#accGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="url(#accGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Snowflake ticks -->
    <line x1="-7" y1="-21" x2="0" y2="-28" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="7"  y1="-21" x2="0" y2="-28" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-7" y1="21"  x2="0" y2="28"  stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="7"  y1="21"  x2="0" y2="28"  stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-21" y1="-7" x2="-28" y2="0" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-21" y1="7"  x2="-28" y2="0" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="21"  y1="-7" x2="28"  y2="0" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="21"  y1="7"  x2="28"  y2="0" stroke="#00BFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="7" fill="#0F1923" stroke="url(#accGrad)" stroke-width="3"/>
    <circle cx="0" cy="0" r="3" fill="url(#accGrad)"/>
  </g>

  <!-- Brand text -->
  <text x="76" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="800" fill="#E8EDF2" letter-spacing="1">
    Meu<tspan fill="url(#accGrad)">Gest</tspan>HVAC
  </text>

  <!-- Tagline -->
  <text x="77" y="67" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#8FA3B1" letter-spacing="2">
    SISTEMA DE GESTÃO HVAC
  </text>

  <!-- Divider -->
  <line x1="76" y1="78" x2="372" y2="78" stroke="#2D3F55" stroke-width="1"/>

  <!-- Sub info -->
  <text x="77" y="96" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4A6070" letter-spacing="1">
    ORÇAMENTOS · AGENDA · FINANCEIRO · RELATÓRIOS
  </text>
</svg>

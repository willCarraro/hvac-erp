<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>ARCLASS — Orçamento</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
const params  = new URLSearchParams(window.location.search);
const quoteId = params.get('id');

(async () => {
  if (!quoteId) { nav('orcamentos.html'); return; }
  const ok = await requireAuth();
  if (!ok) return;
  await renderPage();
})();

async function renderPage() {
  const [{ data: q }, { data: items }, { data: logs }] = await Promise.all([
    sb.from('quotes').select('*, customers(id, name, phone, email)').eq('id', quoteId).single(),
    sb.from('quote_items').select('*').eq('quote_id', quoteId),
    sb.from('status_logs').select('*, users(full_name)').eq('quote_id', quoteId).order('changed_at'),
  ]);

  if (!q) { toast('Orçamento não encontrado', 'err'); nav('orcamentos.html'); return; }

  // Ações disponíveis por status
  const actions = {
    draft:     [{ label: '📤 Marcar como Enviado',   status: 'sent',      cls: 'bp'  },
                { label: '✏️ Editar orçamento',       action: 'edit',     cls: 'bs'  }],
    pending:   [{ label: '📤 Marcar como Enviado',   status: 'sent',      cls: 'bp'  }],
    to_send:   [{ label: '📤 Marcar como Enviado',   status: 'sent',      cls: 'bp'  }],
    sent:      [{ label: '✅ Aprovado pelo cliente',  status: 'approved',  cls: 'bok' },
                { label: '✗ Cliente recusou',         status: 'rejected',  cls: 'berr'}],
    approved:  [{ label: '📅 Agendar serviço',        status: 'scheduled', cls: 'bp'  }],
    scheduled: [{ label: '🔧 Iniciar execução',       status: 'finished',  cls: 'bp'  }],
    finished:  [],
    rejected:  [{ label: '🔄 Reabrir como rascunho', status: 'draft',     cls: 'bs'  }],
  };

  const btns = (actions[q.status] || []).map(a => {
    if (a.action === 'edit') return `<button class="btn ${a.cls}" onclick="nav('orcamento-novo.html?edit=${q.id}')">
      ${a.label}</button>`;
    return `<button class="btn ${a.cls}" onclick="doStatus('${a.status}', '${a.label}')">${a.label}</button>`;
  }).join('');

  // Itens do orçamento
  const itemsHtml = items && items.length ? items.map(i => `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;margin-bottom:4px;">${i.description}</div>
          <div style="font-size:11px;color:var(--txt2);">${stLabel(i.service_type)} · ${dfLabel(i.difficulty)}${i.is_urgent ? ' · ⚡ Urgente' : ''}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:10px;">
        <div style="font-size:11px;color:var(--txt2);">🔨 MO: ${i.labor_hours}h</div>
        <div style="font-size:11px;color:var(--txt2);">📦 Mat: ${fmt(i.material_cost)}</div>
        ${i.gas_cost ? `<div style="font-size:11px;color:var(--txt2);">💨 Gás: ${fmt(i.gas_cost)}</div>` : ''}
        ${i.parts_cost ? `<div style="font-size:11px;color:var(--txt2);">🔩 Peças: ${fmt(i.parts_cost)}</div>` : ''}
      </div>
    </div>`).join('') : '';

  // Timeline de status
  const timelineHtml = logs && logs.length ? `
    <div class="sec-hdr"><div class="sec-title">Histórico</div></div>
    <div class="timeline">
      ${logs.map((l, i) => `
        <div class="tl-item">
          <div class="tl-dot ok">✓</div>
          <div class="tl-body">
            <div class="tl-label">${sLabel(l.to_status)}</div>
            <div class="tl-date">${fdatetime(l.changed_at)} · ${l.users?.full_name || 'Sistema'}</div>
            ${l.notes ? `<div class="tl-note">${l.notes}</div>` : ''}
          </div>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="nav('orcamentos.html')">←</button>
      <h1>Orçamento #${q.sequence}/${q.year}</h1>
    </div>

    <!-- Status + Cliente -->
    <div style="padding:14px 14px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span class="${sBadgeClass(q.status)}" style="font-size:12px;padding:5px 12px;">${sLabel(q.status)}</span>
        <span style="font-size:11px;color:var(--txt2);">v${q.version} · ${fdate(q.created_at)}</span>
      </div>

      <!-- Cliente -->
      <div class="card" style="cursor:pointer;" onclick="nav('cliente-detalhe.html?id=${q.customers?.id}')">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:40px;height:40px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--acc);flex-shrink:0;">
            ${initials(q.customers?.name)}
          </div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:600;">${q.customers?.name || '—'}</div>
            ${q.customers?.phone ? `<a class="tel" href="tel:${q.customers.phone}" style="font-size:12px;">${q.customers.phone}</a>` : ''}
          </div>
          <span style="color:var(--txt2);">›</span>
        </div>
      </div>
    </div>

    <!-- Itens -->
    ${itemsHtml ? `<div class="sec-hdr"><div class="sec-title">Itens do serviço</div></div><div style="padding:0 14px;">${itemsHtml}</div>` : ''}

    <!-- Resumo financeiro -->
    <div class="sec-hdr"><div class="sec-title">Resumo financeiro</div></div>
    <div style="padding:0 14px;">
      <div class="qsum">
        <div class="qrow"><span>Custo estimado</span><span>${fmt(q.total_cost)}</span></div>
        ${q.discount ? `<div class="qrow"><span>Desconto</span><span style="color:var(--err);">— ${fmt(q.discount)}</span></div>` : ''}
        <div class="qrow qtotal"><span>TOTAL</span><span class="qval">${fmt(q.total_price)}</span></div>
        <div class="qrow" style="margin-top:4px;">
          <span style="color:var(--txt2);">Lucro estimado</span>
          <span style="color:${q.estimated_profit >= 0 ? 'var(--ok)' : 'var(--err)'};">${fmt(q.estimated_profit)}</span>
        </div>
      </div>
    </div>

    ${q.notes ? `
    <div class="sec-hdr"><div class="sec-title">Observações</div></div>
    <div style="padding:0 14px 4px;font-size:13px;color:var(--txt2);line-height:1.7;">${q.notes}</div>` : ''}

    ${timelineHtml}

    <!-- Ações -->
    ${btns ? `
    <div class="sec-hdr"><div class="sec-title">Ações</div></div>
    <div style="padding:0 14px 24px;display:flex;flex-direction:column;gap:10px;">
      ${btns}
    </div>` : '<div style="padding:14px;"></div>'}
  </div>`;
}

async function doStatus(newStatus, label) {
  const confirm = window.confirm(`Confirmar: "${label}"?`);
  if (!confirm) return;

  // Buscar status atual
  const { data: q } = await sb.from('quotes').select('status').eq('id', quoteId).single();

  // Atualizar status
  const { error } = await sb.from('quotes').update({
    status: newStatus,
    updated_at: new Date().toISOString(),
  }).eq('id', quoteId);

  if (error) { toast('Erro ao atualizar status', 'err'); return; }

  // Registrar no status_log
  await sb.from('status_logs').insert([{
    quote_id:    parseInt(quoteId),
    from_status: q?.status || null,
    to_status:   newStatus,
    changed_by:  currentUser.id,
    changed_at:  new Date().toISOString(),
  }]);

  toast('Status atualizado!', 'ok');
  await renderPage();
}
</script>
</body>
</html>

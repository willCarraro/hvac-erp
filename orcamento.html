<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Orçamento</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.flow-bar{display:flex;align-items:center;padding:12px 14px;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.flow-bar::-webkit-scrollbar{display:none;}
.flow-step{display:flex;align-items:center;gap:0;flex-shrink:0;}
.flow-dot{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--txt2);flex-shrink:0;transition:all .3s;}
.flow-dot.done{background:var(--ok);border-color:var(--ok);color:white;}
.flow-dot.active{background:var(--acc);border-color:var(--acc);color:#0F1923;}
.flow-line{width:20px;height:2px;background:var(--bdr);}
.flow-line.done{background:var(--ok);}
.flow-lbl{font-size:9px;color:var(--txt2);text-align:center;margin-top:3px;white-space:nowrap;}
.flow-item{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.action-grid{display:grid;gap:8px;padding:0 14px 14px;}
.action-btn{padding:13px 16px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;}
.action-btn:active{opacity:.8;}
.ab-send{background:var(--acc);color:#0F1923;}
.ab-approve{background:var(--ok);color:white;}
.ab-reject{background:var(--bg3);color:var(--err);border:1.5px solid var(--err);}
.ab-edit{background:var(--bg3);color:var(--txt);border:1.5px solid var(--bdr);}
.ab-pdf{background:var(--bg3);color:var(--acc);border:1.5px solid var(--acc);}
.ab-agenda{background:#9B59B6;color:white;}
.detail-section{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;margin:0 14px 10px;overflow:hidden;}
.detail-hdr{background:var(--bg3);padding:10px 14px;font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--bdr);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-lbl{color:var(--txt2);flex-shrink:0;padding-right:10px;}
.detail-val{color:var(--txt);font-weight:500;text-align:right;}
.mat-detail-item{padding:10px 14px;border-bottom:1px solid var(--bdr);font-size:13px;}
.mat-detail-item:last-child{border-bottom:none;}
.mat-name{font-weight:600;margin-bottom:3px;}
.mat-info{display:flex;gap:14px;font-size:11px;color:var(--txt2);}
.mat-sell{color:var(--acc);font-weight:700;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
const params=new URLSearchParams(window.location.search);
const quoteId=params.get('id');
const showDetail=params.get('detail')==='1';

const STATUS_ORDER=['draft','pending','to_send','sent','approved','scheduled','finished'];
const STATUS_LABELS={draft:'Rascunho',pending:'Pendente',to_send:'A Enviar',sent:'Enviado',approved:'Aprovado',scheduled:'Agendado',finished:'Concluído',rejected:'Reprovado'};
const STYPE_MAP={installation:'🔧 Instalação',preventive:'🛡️ Preventiva',corrective:'⚡ Corretiva'};

(async()=>{
  if(!quoteId){nav('orcamentos.html');return;}
  const ok=await requireAuth();if(!ok)return;
  await renderPage();
})();

async function renderPage(){
  const[{data:q},{data:items},{data:logs},{data:instItems},{data:prevItems},{data:corrItems},{data:extras}]=await Promise.all([
    sb.from('quotes').select('*,customers(id,name,phone,email,document,street,number,city,state)').eq('id',quoteId).single(),
    sb.from('quote_items').select('*').eq('quote_id',quoteId),
    sb.from('status_logs').select('*').order('changed_at').eq('quote_id',quoteId),
    sb.from('quote_installation_items').select('*').eq('quote_id',quoteId),
    sb.from('quote_preventive_items').select('*').eq('quote_id',quoteId),
    sb.from('quote_corrective_items').select('*').eq('quote_id',quoteId),
    sb.from('quote_extras').select('*').eq('quote_id',quoteId),
  ]);
  if(!q){toast('Orçamento não encontrado','err');nav('orcamentos.html');return;}

  const stype=items?.[0]?.service_type||'installation';
  const isApproved=['approved','scheduled','finished'].includes(q.status);
  const isFinished=q.status==='finished';
  const isDraft=['draft','pending','to_send'].includes(q.status);
  const isSent=q.status==='sent';
  const isRejected=q.status==='rejected';

  // ---- FLOW BAR ----
  const FLOW=[
    {s:'draft',l:'Rascunho'},
    {s:'sent',l:'Enviado'},
    {s:'approved',l:'Aprovado'},
    {s:'scheduled',l:'Agendado'},
    {s:'finished',l:'Concluído'},
  ];
  const curIdx=FLOW.findIndex(f=>f.s===q.status);
  const flowHtml=`<div class="flow-bar">
    ${FLOW.map((f,i)=>`
      <div class="flow-item">
        <div class="flow-dot ${i<curIdx?'done':i===curIdx?'active':''}">${i<curIdx?'✓':i+1}</div>
        <div class="flow-lbl">${f.l}</div>
      </div>
      ${i<FLOW.length-1?`<div style="display:flex;flex-direction:column;"><div class="flow-line ${i<curIdx?'done':''}"></div></div>`:''}
    `).join('')}
  </div>`;

  // ---- AÇÕES DISPONÍVEIS POR STATUS ----
  let actionsHtml='';
  if(isDraft){
    actionsHtml=`
      <button class="action-btn ab-send" onclick="doStatus('sent','Marcar como Enviado')">📤 Marcar como Enviado</button>
      <button class="action-btn ab-edit" onclick="goEdit()">✏️ Editar orçamento</button>
      <button class="action-btn ab-pdf" onclick="nav('pdf-orcamento.html?id=${q.id}')">📄 Gerar PDF</button>`;
  } else if(isSent){
    actionsHtml=`
      <button class="action-btn ab-approve" onclick="doApprove()">✅ Aprovado pelo cliente</button>
      <button class="action-btn ab-reject" onclick="doStatus('rejected','Marcar como Reprovado')">✗ Cliente reprovou</button>
      <button class="action-btn ab-edit" onclick="goEdit()">✏️ Editar orçamento</button>
      <button class="action-btn ab-pdf" onclick="nav('pdf-orcamento.html?id=${q.id}')">📄 Gerar PDF</button>`;
  } else if(q.status==='approved'){
    actionsHtml=`
      <button class="action-btn ab-agenda" onclick="nav('agenda.html?approve_id=${q.id}')">📅 Agendar na Agenda</button>
      <button class="action-btn ab-pdf" onclick="nav('pdf-orcamento.html?id=${q.id}')">📄 Gerar PDF</button>`;
  } else if(q.status==='scheduled'){
    actionsHtml=`
      <button class="action-btn ab-approve" onclick="doFinish()">✓ Marcar como Concluído</button>
      <button class="action-btn ab-pdf" onclick="nav('pdf-orcamento.html?id=${q.id}')">📄 Gerar PDF</button>`;
  } else if(isRejected){
    actionsHtml=`
      <button class="action-btn ab-edit" onclick="doStatus('draft','Reabrir como rascunho')">🔄 Reabrir rascunho</button>
      <button class="action-btn ab-pdf" onclick="nav('pdf-orcamento.html?id=${q.id}')">📄 Gerar PDF</button>`;
  } else if(isFinished){
    actionsHtml=`<button class="action-btn ab-pdf" onclick="nav('pdf-orcamento.html?id=${q.id}')">📄 Gerar PDF</button>`;
  }

  // ---- DETALHES DOS ITENS ----
  let detailItemsHtml='';
  if(instItems?.length){
    detailItemsHtml+=`<div class="detail-section"><div class="detail-hdr">📦 Materiais</div>
      ${instItems.map(i=>`<div class="mat-detail-item">
        <div class="mat-name">${i.name}</div>
        <div class="mat-info">
          <span>${i.quantity} ${i.unit}</span>
          <span>Custo: ${fmt(i.unit_cost*i.quantity)}</span>
          <span class="mat-sell">Venda: ${fmt(i.unit_cost*(1+(i.margin_pct||30)/100)*i.quantity)}</span>
        </div>
      </div>`).join('')}
    </div>`;
  }
  if(prevItems?.length){
    const typeL={hi_wall:'Hi Wall',piso_teto:'Piso Teto',cassete:'Cassete'};
    const diffL={easy:'Fácil',medium:'Médio',hard:'Difícil'};
    detailItemsHtml+=`<div class="detail-section"><div class="detail-hdr">🧊 Equipamentos preventiva</div>
      ${prevItems.map(i=>`<div class="mat-detail-item">
        <div class="mat-name">${typeL[i.ac_type]||i.ac_type} · ${(i.capacity_btu||0).toLocaleString()} BTU</div>
        <div class="mat-info"><span>${i.quantity}×</span><span>${dfLabel(i.difficulty)}</span><span class="mat-sell">${fmt((i.base_price||0)*{easy:financeConfig?.mult_easy||1,medium:financeConfig?.mult_medium||1.3,hard:financeConfig?.mult_hard||1.7}[i.difficulty]*i.quantity)}</span></div>
      </div>`).join('')}
    </div>`;
  }
  if(corrItems?.length){
    const ci=corrItems[0];
    let corrHtml='';
    if(ci.has_gas) corrHtml+=`<div class="detail-row"><span class="detail-lbl">💨 Gás (${(ci.gas_type||'').toUpperCase()})</span><span class="detail-val">${ci.gas_kg}kg</span></div>`;
    if(ci.has_nitrogen) corrHtml+=`<div class="detail-row"><span class="detail-lbl">🔵 Nitrogênio</span><span class="detail-val">${ci.nitrogen_m3}m³</span></div>`;
    if(corrHtml) detailItemsHtml+=`<div class="detail-section"><div class="detail-hdr">⚡ Insumos corretiva</div>${corrHtml}</div>`;
  }
  if(extras?.length){
    detailItemsHtml+=`<div class="detail-section"><div class="detail-hdr">➕ Extras</div>
      ${extras.map(e=>`<div class="detail-row"><span class="detail-lbl">${e.description}</span><span class="detail-val" style="color:var(--acc);">${fmt(e.value)}</span></div>`).join('')}
    </div>`;
  }

  // ---- HISTÓRICO ----
  const tlHtml=logs?.length?`
    <div class="sec-hdr"><div class="sec-title">Histórico</div></div>
    <div class="timeline" style="padding:0 14px;">
      ${logs.map(l=>`<div class="tl-item"><div class="tl-dot ok">✓</div><div class="tl-body">
        <div class="tl-label">${STATUS_LABELS[l.to_status]||l.to_status}</div>
        <div class="tl-date">${fdatetime(l.changed_at)}</div>
      </div></div>`).join('')}
    </div>`:'';

  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="nav('orcamentos.html')">←</button>
      <h1>Orçamento #${q.sequence}/${q.year}</h1>
    </div>

    ${flowHtml}

    <div style="padding:0 14px 4px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span class="${sBadgeClass(q.status)}" style="font-size:12px;padding:5px 12px;">${STATUS_LABELS[q.status]||q.status}</span>
        <span style="font-size:11px;color:var(--txt2);">${STYPE_MAP[stype]||''} · v${q.version}</span>
      </div>

      <!-- Cliente -->
      <div class="card" style="cursor:pointer;margin-bottom:10px;" onclick="nav('cliente-detalhe.html?id=${q.customers?.id}')">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--acc);">${initials(q.customers?.name)}</div>
          <div style="flex:1;"><div style="font-size:14px;font-weight:600;">${q.customers?.name||'—'}</div>
          ${q.customers?.phone?`<a class="tel" href="tel:${q.customers.phone}" style="font-size:12px;">${q.customers.phone}</a>`:''}</div>
          <span style="color:var(--txt2);">›</span>
        </div>
      </div>

      <!-- Resumo financeiro -->
      <div class="qsum">
        <div class="qrow"><span>Custo estimado</span><span>${fmt(q.total_cost)}</span></div>
        ${q.discount?`<div class="qrow"><span>Desconto</span><span style="color:var(--err);">— ${fmt(q.discount)}</span></div>`:''}
        <div class="qrow qtotal"><span>TOTAL</span><span class="qval">${fmt(q.total_price)}</span></div>
        <div class="qrow"><span style="color:var(--txt2);">Lucro estimado</span>
          <span style="color:${q.estimated_profit>=0?'var(--ok)':'var(--err)'};">${fmt(q.estimated_profit)}</span></div>
      </div>

      ${q.notes?`<div style="margin-top:10px;font-size:13px;color:var(--txt2);line-height:1.6;">${q.notes}</div>`:''}
    </div>

    <!-- Detalhes dos itens -->
    ${detailItemsHtml?`
      <div class="sec-hdr"><div class="sec-title">Detalhes do orçamento</div></div>
      ${detailItemsHtml}`:''}

    ${tlHtml}

    <!-- Ações -->
    <div class="sec-hdr"><div class="sec-title">Ações</div></div>
    <div class="action-grid">${actionsHtml}</div>

    <!-- Excluir (apenas rascunhos) -->
    ${isDraft||isRejected?`
      <div style="padding:0 14px 24px;">
        <button class="btn berr btn-sm" style="width:auto;opacity:.7;" onclick="doDelete()">🗑️ Excluir orçamento</button>
      </div>`:
      '<div style="padding:0 0 24px;"></div>'}
  </div>`;
}

function goEdit(){
  const stype=params.get('stype')||'';
  // Detectar tipo pelo quote_items
  sb.from('quote_items').select('service_type').eq('quote_id',quoteId).single().then(({data})=>{
    const t=data?.service_type||'installation';
    const page=t==='installation'?'orcamento-instalacao':t==='preventive'?'orcamento-preventiva':'orcamento-corretiva';
    nav(`${page}.html?edit=${quoteId}`);
  });
}

async function doStatus(newStatus,label){
  if(!confirm(`Confirmar: "${label}"?`))return;
  const{data:q}=await sb.from('quotes').select('status').eq('id',quoteId).single();
  await sb.from('quotes').update({status:newStatus,updated_at:new Date().toISOString()}).eq('id',quoteId);
  await sb.from('status_logs').insert([{quote_id:parseInt(quoteId),owner_id:currentUser.id,
    from_status:q?.status||null,to_status:newStatus,changed_by:currentUser.id,changed_at:new Date().toISOString()}]);
  toast('Status atualizado!','ok');
  await renderPage();
}

async function doApprove(){
  if(!confirm('Confirmar aprovação do orçamento?'))return;
  const{data:q}=await sb.from('quotes').select('*,customers(name)').eq('id',quoteId).single();
  if(!q)return;

  // Atualizar status
  await sb.from('quotes').update({status:'approved',updated_at:new Date().toISOString()}).eq('id',quoteId);
  await sb.from('status_logs').insert([{quote_id:parseInt(quoteId),owner_id:currentUser.id,
    from_status:q.status,to_status:'approved',changed_by:currentUser.id,changed_at:new Date().toISOString()}]);

  // Criar registro de serviço
  await sb.from('quote_services').upsert([{
    quote_id:parseInt(quoteId),owner_id:currentUser.id,status:'pending',
  }],{onConflict:'quote_id'});

  // Lançar despesas de material em accounts_payable (somente agora que aprovado)
  const{data:instItems}=await sb.from('quote_installation_items').select('*').eq('quote_id',quoteId);
  if(instItems?.length){
    const matCost=instItems.reduce((s,i)=>s+(i.unit_cost||0)*(i.quantity||1),0);
    if(matCost>0){
      await sb.from('accounts_payable').insert([{
        owner_id:currentUser.id,category:'material',recurrence:'variable',
        description:`Materiais — Orçamento #${q.sequence}/${q.year} (${q.customers?.name||'cliente'})`,
        amount:Math.round(matCost*100)/100,is_paid:false,
        created_at:new Date().toISOString(),updated_at:new Date().toISOString(),
      }]);
    }
  }

  toast('Orçamento aprovado! Agende na aba Agenda.','ok',4000);
  await renderPage();
}

async function doFinish(){
  if(!confirm('Confirmar conclusão do serviço?'))return;
  const{data:q}=await sb.from('quotes').select('*,customers(name)').eq('id',quoteId).single();
  if(!q)return;

  await sb.from('quotes').update({status:'finished',updated_at:new Date().toISOString()}).eq('id',quoteId);
  await sb.from('status_logs').insert([{quote_id:parseInt(quoteId),owner_id:currentUser.id,
    from_status:q.status,to_status:'finished',changed_by:currentUser.id,changed_at:new Date().toISOString()}]);

  // Atualizar quote_services
  await sb.from('quote_services').update({status:'finished',finished_at:new Date().toISOString()}).eq('quote_id',parseInt(quoteId));

  // Gerar conta a receber
  const{data:existing}=await sb.from('accounts_receivable').select('id').eq('quote_id',parseInt(quoteId)).eq('owner_id',currentUser.id).single();
  if(!existing){
    await sb.from('accounts_receivable').insert([{
      owner_id:currentUser.id,
      quote_id:parseInt(quoteId),
      service_id:null,
      customer_name:q.customers?.name||'—',
      amount_due:q.total_price||0,
      amount_received:0,
      status:'pending',
    }]);
    toast('Serviço concluído! Conta a receber criada no Financeiro.','ok',4000);
  } else {
    toast('Serviço concluído!','ok');
  }
  await renderPage();
}

async function doDelete(){
  if(!confirm('Excluir este orçamento? Esta ação não pode ser desfeita.'))return;
  await Promise.all([
    sb.from('quote_extras').delete().eq('quote_id',quoteId),
    sb.from('quote_items').delete().eq('quote_id',quoteId),
    sb.from('quote_installation_items').delete().eq('quote_id',quoteId),
    sb.from('quote_preventive_items').delete().eq('quote_id',quoteId),
    sb.from('quote_corrective_items').delete().eq('quote_id',quoteId),
    sb.from('status_logs').delete().eq('quote_id',quoteId),
  ]);
  await sb.from('quotes').delete().eq('id',quoteId);
  toast('Orçamento excluído','ok');
  setTimeout(()=>nav('orcamentos.html'),800);
}
</script>
</body>
</html>

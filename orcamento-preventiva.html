<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Preventiva</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.add-btn{background:rgba(0,191,255,.1);border:1.5px dashed var(--acc);border-radius:10px;padding:12px;width:100%;color:var(--acc);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.eq-form,.extra-form{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px;}
.list-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:6px;}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;}
.item-del{background:none;border:none;color:var(--err);font-size:16px;cursor:pointer;}
.footer-card{background:var(--bg3);border-radius:12px;padding:14px;}
.frow{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--bdr);}
.frow:last-child{border-bottom:none;}
.frow-lbl{color:var(--txt2);}
.f-total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px;border-top:2px solid var(--bdr);margin-top:4px;}
.f-total-val{font-size:22px;font-weight:800;color:var(--acc);}
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.type-tabs,.diff-tabs{display:flex;gap:6px;margin-top:4px;}
.type-tab,.diff-tab{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;}
.type-tab.sel,.diff-tab.sel{border-color:var(--acc);background:rgba(0,191,255,.1);color:var(--acc);}
.edit-notice{background:rgba(243,156,18,.1);border:1px solid var(--warn);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--warn);margin-bottom:12px;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script><script src="js/calc.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const custId = params.get('customer_id');
const editId = params.get('edit');
const BTUS = [9000,12000,18000,24000,30000,36000,48000,60000];
const AC_TYPES = [{v:'hi_wall',l:'Hi Wall'},{v:'piso_teto',l:'Piso Teto'},{v:'cassete',l:'Cassete'}];
const DIFFS = [{v:'easy',l:'Fácil'},{v:'medium',l:'Médio'},{v:'hard',l:'Difícil'}];

let customer=null, equipments=[], extras=[];
let showEqForm=false, showExtraForm=false;
let selType='hi_wall', selDiff='medium';
let existingQuote=null;

(async()=>{
  const ok=await requireAuth(); if(!ok)return;
  if(editId){
    const[{data:q},{data:prevItems},{data:exItems}]=await Promise.all([
      sb.from('quotes').select('*,customers(id,name)').eq('id',editId).single(),
      sb.from('quote_preventive_items').select('*').eq('quote_id',editId),
      sb.from('quote_extras').select('*').eq('quote_id',editId),
    ]);
    if(!q){toast('Orçamento não encontrado','err');history.back();return;}
    existingQuote=q; customer=q.customers;
    const cfg=financeConfig||{};
    const BASE={hi_wall:cfg.hiwall_base||250,piso_teto:cfg.pisoteto_base||380,cassete:cfg.cassete_base||450};
    const MULT={easy:cfg.mult_easy||1,medium:cfg.mult_medium||1.3,hard:cfg.mult_hard||1.7};
    equipments=(prevItems||[]).map(e=>({
      id:e.id, type:e.ac_type, typeLabel:AC_TYPES.find(t=>t.v===e.ac_type)?.l||e.ac_type,
      btu:e.capacity_btu, quantity:e.quantity, difficulty:e.difficulty,
      diffLabel:DIFFS.find(d=>d.v===e.difficulty)?.l||e.difficulty,
      base_price:e.base_price||BASE[e.ac_type]||250,
      unitPrice:Math.round((e.base_price||BASE[e.ac_type]||250)*(MULT[e.difficulty]||1.3)*100)/100,
      total:Math.round((e.base_price||BASE[e.ac_type]||250)*(MULT[e.difficulty]||1.3)*(e.quantity||1)*100)/100,
    }));
    extras=(exItems||[]).map(e=>({id:e.id,description:e.description,value:e.value}));
  } else {
    if(!custId){nav('orcamento-novo.html');return;}
    const{data}=await sb.from('customers').select('id,name').eq('id',custId).single();
    if(!data){toast('Cliente não encontrado','err');nav('orcamento-novo.html');return;}
    customer=data;
  }
  draw();
})();

const R=v=>Math.round((parseFloat(v)||0)*100)/100;
const D=(sub,pct,fix)=>fix>0?R(fix):R(sub*(pct||0)/100);

function getBasePrice(type){const cfg=financeConfig||{};return{hi_wall:cfg.hiwall_base||250,piso_teto:cfg.pisoteto_base||380,cassete:cfg.cassete_base||450}[type]||250;}
function getMult(diff){const cfg=financeConfig||{};return{easy:cfg.mult_easy||1,medium:cfg.mult_medium||1.3,hard:cfg.mult_hard||1.7}[diff]||1.3;}

function draw(){
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="${editId?`nav('orcamento.html?id=${editId}')`:history.back()}">←</button>
      <h1>${editId?'✏️ Editar — Preventiva':'🛡️ Preventiva'}</h1>
    </div>
    <div class="fp">
      ${editId?`<div class="edit-notice">✏️ Editando orçamento #${existingQuote?.sequence}/${existingQuote?.year}</div>`:''}
      <div style="background:rgba(0,191,255,.08);border:1.5px solid var(--acc);border-radius:10px;padding:10px 14px;margin-bottom:14px;">
        <div style="font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;">Cliente</div>
        <div style="font-size:15px;font-weight:700;margin-top:2px;">${customer?.name||'—'}</div>
      </div>
      <div class="fg"><label class="fl">Descrição *</label>
        <input class="fi" id="qDesc" value="${existingQuote?.notes||''}" placeholder="Ex: Preventiva — 3 splits sala e quartos"></div>

      <!-- EQUIPAMENTOS -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px;">
        <div style="font-size:14px;font-weight:700;">🧊 Equipamentos</div>
        <div style="font-size:10px;color:var(--txt2);">Hi Wall ${fmt(getBasePrice('hi_wall'))} · Piso Teto ${fmt(getBasePrice('piso_teto'))} · Cassete ${fmt(getBasePrice('cassete'))}</div>
      </div>
      <div id="eqList"></div>
      ${showEqForm ? eqFormHtml() : `<button class="add-btn" onclick="showEqForm=true;draw()">+ Adicionar equipamento</button>`}

      <!-- EXTRAS -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px;">
        <div style="font-size:14px;font-weight:700;">➕ Extras</div>
        <div style="font-size:11px;color:var(--txt2);">Filtros, insumos, deslocamento...</div>
      </div>
      <div id="extraList"></div>
      ${showExtraForm ? extraFormHtml() : `<button class="add-btn" onclick="showExtraForm=true;draw()">+ Adicionar extra</button>`}

      <!-- DESCONTO -->
      <div class="fsec">Desconto</div>
      <div class="disc-grid">
        <div class="fg"><label class="fl">Em %</label>
          <input class="fi" id="discPct" type="number" value="${existingQuote?.params_snapshot?.discount_pct||0}" step="1" min="0" max="100" inputmode="decimal" oninput="syncDisc('pct')"></div>
        <div class="fg"><label class="fl">Em R$</label>
          <input class="fi" id="discVal" type="number" value="${existingQuote?.discount||0}" step="10" min="0" inputmode="decimal" oninput="syncDisc('val')"></div>
      </div>
      <div class="fg" style="margin-top:10px;"><label class="fl">Observações</label>
        <textarea class="fta" id="qNotes" placeholder="Periodicidade, garantia...">${existingQuote?.notes||''}</textarea></div>

      <div class="fsec">Resumo financeiro</div>
      <div class="footer-card" id="footerCard"></div>
      <div id="qErr" style="margin-top:12px;"></div>
      <button class="btn bp" id="savebtn" style="margin-top:14px;" onclick="doSave()">
        ✓ ${editId?'Salvar alterações':'Salvar Orçamento'}
      </button>
    </div>
  </div>`;
  renderEqList(); renderExtraList(); updateFooter();
}

function eqFormHtml(){
  const base=getBasePrice(selType), mult=getMult(selDiff);
  const qty=1;
  return`<div class="eq-form">
    <div class="fg"><label class="fl">Tipo</label>
      <div class="type-tabs">${AC_TYPES.map(t=>`<div class="type-tab ${selType===t.v?'sel':''}" onclick="selType='${t.v}';refreshEqForm()">${t.l}</div>`).join('')}</div>
    </div>
    <div class="fr" style="margin-top:10px;">
      <div class="fg"><label class="fl">Capacidade BTU</label>
        <select class="fs" id="eBtu">${BTUS.map(b=>`<option value="${b}">${b.toLocaleString()}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Quantidade *</label>
        <input class="fi" id="eQty" type="number" value="1" min="1" step="1" inputmode="numeric"></div>
    </div>
    <div class="fg" style="margin-top:10px;"><label class="fl">Dificuldade</label>
      <div class="diff-tabs">${DIFFS.map(d=>`<div class="diff-tab ${selDiff===d.v?'sel':''}" onclick="selDiff='${d.v}';refreshEqForm()">${d.l}</div>`).join('')}</div>
    </div>
    <div style="background:var(--bg2);border-radius:8px;padding:8px 12px;margin-top:10px;font-size:12px;color:var(--txt2);">
      Preço: ${fmt(base)} × ${mult} × qtd = <strong style="color:var(--acc);">${fmt(R(base*mult))} /un.</strong>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
      <button class="btn bs" onclick="showEqForm=false;selType='hi_wall';selDiff='medium';draw()">Cancelar</button>
      <button class="btn bp" onclick="addEq()">+ Adicionar</button>
    </div>
  </div>`;}

function extraFormHtml(){return`
  <div class="extra-form">
    <div class="fg"><label class="fl">Descrição *</label>
      <input class="fi" id="eName" placeholder="Ex: Filtro, Produto limpeza, Deslocamento"></div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Valor R$</label>
      <input class="fi" id="eValue" type="number" value="0" step="10" min="0" inputmode="decimal"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
      <button class="btn bs" onclick="showExtraForm=false;draw()">Cancelar</button>
      <button class="btn bp" onclick="addExtra()">+ Adicionar</button>
    </div>
  </div>`;}

function refreshEqForm(){ draw(); }

function addEq(){
  const btu=parseInt(document.getElementById('eBtu')?.value)||9000;
  const quantity=parseInt(document.getElementById('eQty')?.value)||1;
  if(quantity<1){toast('Quantidade mínima: 1','err');return;}
  const base=getBasePrice(selType), mult=getMult(selDiff);
  const unitPrice=R(base*mult);
  equipments.push({id:Date.now(),type:selType,typeLabel:AC_TYPES.find(t=>t.v===selType)?.l||selType,
    btu,quantity,difficulty:selDiff,diffLabel:DIFFS.find(d=>d.v===selDiff)?.l||selDiff,
    base_price:base,unitPrice,total:R(unitPrice*quantity)});
  showEqForm=false;selType='hi_wall';selDiff='medium';draw();
}

function addExtra(){
  const name=document.getElementById('eName')?.value?.trim();
  const value=parseFloat(document.getElementById('eValue')?.value)||0;
  if(!name){toast('Informe a descrição','err');return;}
  extras.push({id:Date.now(),description:name,value});
  showExtraForm=false;draw();
}

function removeEq(id){equipments=equipments.filter(e=>e.id!==id);draw();}
function removeExtra(id){extras=extras.filter(e=>e.id!==id);draw();}

function renderEqList(){
  const el=document.getElementById('eqList');if(!el)return;
  if(!equipments.length){el.innerHTML='<div style="font-size:12px;color:var(--txt2);text-align:center;padding:6px 0 10px;">Nenhum equipamento adicionado</div>';return;}
  el.innerHTML=equipments.map(e=>`
    <div class="list-item">
      <div class="item-top">
        <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${e.typeLabel} · ${(e.btu||0).toLocaleString()} BTU · ${e.quantity}×</div>
        <div style="font-size:11px;color:var(--txt2);">${e.diffLabel} · ${fmt(e.unitPrice)}/un.</div></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:14px;font-weight:700;color:var(--acc);">${fmt(e.total)}</span>
          <button class="item-del" onclick="removeEq(${e.id})">✕</button>
        </div>
      </div>
    </div>`).join('');
}

function renderExtraList(){
  const el=document.getElementById('extraList');if(!el)return;
  if(!extras.length){el.innerHTML='<div style="font-size:12px;color:var(--txt2);text-align:center;padding:6px 0 10px;">Nenhum extra adicionado</div>';return;}
  el.innerHTML=extras.map(e=>`
    <div class="list-item">
      <div class="item-top"><span style="font-size:13px;font-weight:600;flex:1;">${e.description}</span><button class="item-del" onclick="removeExtra(${e.id})">✕</button></div>
      <div style="font-size:13px;color:var(--acc);font-weight:700;margin-top:4px;">${fmt(e.value)}</div>
    </div>`).join('');
}

function getCalc(){
  const discPct=parseFloat(document.getElementById('discPct')?.value)||0;
  const discVal=parseFloat(document.getElementById('discVal')?.value)||0;
  const eqSubtotal=R(equipments.reduce((s,e)=>s+e.total,0));
  const extraTotal=R(extras.reduce((s,e)=>s+e.value,0));
  const subtotal=R(eqSubtotal+extraTotal);
  const disc=D(subtotal,discPct,discVal);
  const final=R(Math.max(0,subtotal-disc));
  return{discPct,discVal,eqSubtotal,extraTotal,subtotal,disc,final,profit:final};
}

function updateFooter(){
  const r=getCalc();
  const el=document.getElementById('footerCard');if(!el)return;
  el.innerHTML=`
    <div class="frow"><span class="frow-lbl">Equipamentos (${equipments.reduce((s,e)=>s+e.quantity,0)} un.)</span><span>${fmt(r.eqSubtotal)}</span></div>
    ${r.extraTotal?`<div class="frow"><span class="frow-lbl">Extras</span><span>${fmt(r.extraTotal)}</span></div>`:''}
    <div class="frow"><span class="frow-lbl">Desconto</span><span style="color:var(--err);">— ${fmt(r.disc)}</span></div>
    <div class="f-total-row"><span style="font-size:16px;font-weight:800;">Total para o cliente</span><span class="f-total-val">${fmt(r.final)}</span></div>
    <div class="frow"><span class="frow-lbl">Lucro estimado</span>
      <span style="font-weight:600;color:var(--ok);">${fmt(r.profit)}</span></div>`;
}

function syncDisc(src){
  const r=getCalc();
  if(src==='pct'){const pct=parseFloat(document.getElementById('discPct')?.value)||0;const el=document.getElementById('discVal');if(el)el.value=(r.subtotal*pct/100).toFixed(2);}
  else{const dv=parseFloat(document.getElementById('discVal')?.value)||0;const el=document.getElementById('discPct');if(el)el.value=r.subtotal>0?(dv/r.subtotal*100).toFixed(1):'0';}
  updateFooter();
}

async function doSave(){
  const desc=val('qDesc');clearErr('qErr');
  if(!desc){showErr('qErr','Preencha a descrição');return;}
  if(!equipments.length){showErr('qErr','Adicione pelo menos um equipamento');return;}
  setBtnLoading('savebtn',true,editId?'Salvar alterações':'Salvar Orçamento');
  const r=getCalc(); const notes=val('qNotes');

  if(editId){
    const{error}=await sb.from('quotes').update({
      discount:r.disc,total_cost:0,total_price:r.final,
      estimated_profit:r.profit,notes,
      params_snapshot:{...financeConfig,discount_pct:r.discPct},
      updated_at:new Date().toISOString(),
    }).eq('id',editId);
    if(error){showErr('qErr','Erro: '+error.message);setBtnLoading('savebtn',false,'Salvar alterações');return;}
    await sb.from('quote_preventive_items').delete().eq('quote_id',editId);
    await sb.from('quote_extras').delete().eq('quote_id',editId);
    await sb.from('quote_preventive_items').insert(equipments.map(e=>({
      quote_id:parseInt(editId),owner_id:currentUser.id,ac_type:e.type,capacity_btu:e.btu,quantity:e.quantity,difficulty:e.difficulty,base_price:e.base_price,
    })));
    if(extras.length) await sb.from('quote_extras').insert(extras.map(e=>({
      quote_id:parseInt(editId),owner_id:currentUser.id,description:e.description,value:e.value,
    })));
    toast('Orçamento atualizado!','ok');
    setTimeout(()=>nav('orcamento.html?id='+editId),800);
  } else {
    const year=new Date().getFullYear();
    const seq=await nextQuoteSequence(sb,currentUser.id,year);
    const{data:q,error:qe}=await sb.from('quotes').insert([{
      owner_id:currentUser.id,customer_id:parseInt(custId),year,sequence:seq,version:1,status:'draft',
      discount:r.disc,total_cost:0,total_price:r.final,estimated_profit:r.profit,notes,
      params_snapshot:{...financeConfig,discount_pct:r.discPct},created_by_id:currentUser.id,
    }]).select('id').single();
    if(qe){showErr('qErr','Erro: '+qe.message);setBtnLoading('savebtn',false,'Salvar Orçamento');return;}
    await sb.from('quote_preventive_items').insert(equipments.map(e=>({
      quote_id:q.id,owner_id:currentUser.id,ac_type:e.type,capacity_btu:e.btu,quantity:e.quantity,difficulty:e.difficulty,base_price:e.base_price,
    })));
    if(extras.length) await sb.from('quote_extras').insert(extras.map(e=>({
      quote_id:q.id,owner_id:currentUser.id,description:e.description,value:e.value,
    })));
    await sb.from('quote_items').insert([{
      owner_id:currentUser.id,quote_id:q.id,service_type:'preventive',description:desc,difficulty:'medium',labor_hours:0,material_cost:0,created_by_id:currentUser.id,
    }]);
    toast('Orçamento salvo!','ok');
    setTimeout(()=>nav('orcamento.html?id='+q.id),800);
  }
}
</script>
</body>
</html>

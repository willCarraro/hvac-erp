<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>ARCLASS — Login</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.auth-page {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 24px;
}
.auth-logo  { font-size: 52px; margin-bottom: 8px; }
.auth-brand { font-size: 26px; font-weight: 800; color: var(--acc); letter-spacing: 2px; }
.auth-sub   { font-size: 13px; color: var(--txt2); margin-bottom: 40px; margin-top: 4px; }
.auth-form  { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
.auth-link  { font-size: 13px; color: var(--txt2); text-align: center; margin-top: 20px; }
.auth-link span { color: var(--acc); cursor: pointer; font-weight: 600; }
.tab-btns { display: flex; background: var(--bg2); border-radius: 10px; padding: 4px; gap: 4px; width: 100%; max-width: 360px; margin-bottom: 8px; }
.tab-btn { flex: 1; padding: 9px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; background: none; color: var(--txt2); transition: all .2s; }
.tab-btn.on { background: var(--acc); color: #0F1923; }
</style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spin"></div><p>Carregando...</p></div>
</div>

<script src="js/config.js"></script>
<script>
(async () => {
  // Se já logado, vai pro home
  const { data: { session } } = await sb.auth.getSession();
  if (session) { window.location.href = 'home.html'; return; }
  renderLogin();
})();

let isRegister = false;

function renderLogin() {
  document.getElementById('app').innerHTML = `
  <div class="auth-page">
    <div class="auth-logo">❄️</div>
    <div class="auth-brand">ARCLASS</div>
    <div class="auth-sub">Sistema de Gestão HVAC</div>

    <div class="tab-btns">
      <button class="tab-btn on" id="tabLogin"  onclick="switchTab(false)">Entrar</button>
      <button class="tab-btn"   id="tabReg"    onclick="switchTab(true)">Criar conta</button>
    </div>

    <div class="auth-form" id="loginForm">
      <div class="fg">
        <label class="fl">E-mail</label>
        <input class="fi" id="le" type="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="fg">
        <label class="fl">Senha</label>
        <input class="fi" id="lp" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="lerr"></div>
      <button class="btn bp" id="lbtn" onclick="doLogin()">Entrar</button>
    </div>

    <div class="auth-form" id="regForm" style="display:none;">
      <div class="fg">
        <label class="fl">Nome completo</label>
        <input class="fi" id="rn" type="text" placeholder="Seu nome completo">
      </div>
      <div class="fg">
        <label class="fl">E-mail</label>
        <input class="fi" id="re" type="email" placeholder="seu@email.com">
      </div>
      <div class="fg">
        <label class="fl">Senha (mínimo 6 caracteres)</label>
        <input class="fi" id="rp" type="password" placeholder="••••••••">
      </div>
      <div id="rerr"></div>
      <button class="btn bp" id="rbtn" onclick="doRegister()">Criar conta</button>
    </div>

    <p style="margin-top:28px;font-size:11px;color:var(--txt2);text-align:center;opacity:.6;">
      ARCLASS CLIMATIZAÇÃO · Curitiba/PR
    </p>
  </div>`;
}

function switchTab(register) {
  isRegister = register;
  document.getElementById('loginForm').style.display = register ? 'none' : 'flex';
  document.getElementById('regForm').style.display   = register ? 'flex' : 'none';
  document.getElementById('tabLogin').className = 'tab-btn' + (register ? '' : ' on');
  document.getElementById('tabReg').className   = 'tab-btn' + (register ? ' on' : '');
}

async function doLogin() {
  const e = val('le'), p = document.getElementById('lp')?.value;
  clearErr('lerr');
  if (!e || !p) { showErr('lerr', 'Preencha e-mail e senha'); return; }
  setBtnLoading('lbtn', true, 'Entrar');
  const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
  if (error) {
    showErr('lerr', 'E-mail ou senha incorretos');
    setBtnLoading('lbtn', false, 'Entrar');
    return;
  }
  window.location.href = 'home.html';
}

async function doRegister() {
  const n = val('rn'), e = val('re'), p = document.getElementById('rp')?.value;
  clearErr('rerr');
  if (!n || !e || !p) { showErr('rerr', 'Preencha todos os campos'); return; }
  if (p.length < 6)   { showErr('rerr', 'Senha deve ter no mínimo 6 caracteres'); return; }
  setBtnLoading('rbtn', true, 'Criar conta');

  const { data, error } = await sb.auth.signUp({ email: e, password: p });
  if (error) { showErr('rerr', 'Erro: ' + error.message); setBtnLoading('rbtn', false, 'Criar conta'); return; }

  // Cria perfil na tabela users
  const { error: pe } = await sb.from('users').insert([{
    id: data.user.id,
    username: e.split('@')[0],
    full_name: n,
    email: e,
    role: 'adm',
  }]);

  if (pe) {
    showErr('rerr', 'Conta criada! Faça login.');
    switchTab(false);
    setBtnLoading('rbtn', false, 'Criar conta');
    return;
  }
  window.location.href = 'home.html';
}
</script>
</body>
</html>

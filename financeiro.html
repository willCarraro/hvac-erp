<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Financeiro</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.fin-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.ftab{flex:1;padding:11px;border:none;background:none;color:var(--txt2);font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;}
.ftab.on{color:var(--acc);border-bottom-color:var(--acc);}
.fin-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:13px;margin-bottom:9px;}
.fin-card.paid{border-color:var(--ok);opacity:.7;}
.fin-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.fin-name{font-size:14px;font-weight:600;flex:1;}
.fin-amt{font-size:15px;font-weight:800;}
.fin-sub{font-size:11px;color:var(--txt2);margin-top:3px;}
.fin-actions{display:flex;gap:8px;margin-top:10px;}
.pay-chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.chip-pend{background:rgba(243,156,18,.15);color:var(--warn);}
.chip-done{background:rgba(46,204,113,.15);color:var(--ok);}
.chip-part{background:rgba(0,191,255,.15);color:var(--acc);}
.sum-bar{background:var(--bg3);padding:12px 14px;display:flex;gap:0;}
.sum-item{flex:1;text-align:center;padding:4px;}
.sum-item+.sum-item{border-left:1px solid var(--bdr);}
.sum-lbl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;}
.sum-val{font-size:16px;font-weight:800;margin-top:2px;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let activeTab='receivable';
let receivables=[],payables=[];

(async()=>{
  const ok=await requireAuth();if(!ok)return;
  await loadAll();
  draw();
})();

async function loadAll(){
  const [r,p]=await Promise.all([
    sb.from('accounts_receivable').select('*,services(customer_snapshot,quote_id)').eq('owner_id',currentUser.id).order('due_date'),
    sb.from('accounts_payable').select('*').eq('owner_id',currentUser.id).order('due_date'),
  ]);
  receivables=r.data||[];
  payables=p.data||[];
}

function draw(){
  const totalRecv=receivables.filter(r=>r.status!=='received').reduce((s,r)=>s+r.amount_due,0);
  const totalPay =payables.filter(p=>!p.is_paid).reduce((s,p)=>s+p.amount,0);
  const recvDone =receivables.filter(r=>r.status==='received').reduce((s,r)=>s+r.amount_received,0);

  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr"><h1>💰 Financeiro</h1></div>
    <div class="sum-bar">
      <div class="sum-item"><div class="sum-lbl">A receber</div><div class="sum-val" style="color:var(--ok);">${fmt(totalRecv)}</div></div>
      <div class="sum-item"><div class="sum-lbl">A pagar</div><div class="sum-val" style="color:var(--err);">${fmt(totalPay)}</div></div>
      <div class="sum-item"><div class="sum-lbl">Recebido</div><div class="sum-val" style="color:var(--acc);">${fmt(recvDone)}</div></div>
    </div>
    <div class="fin-tabs">
      <button class="ftab ${activeTab==='receivable'?'on':''}" onclick="setTab('receivable')">A Receber</button>
      <button class="ftab ${activeTab==='payable'?'on':''}"    onclick="setTab('payable')">A Pagar</button>
    </div>
    <div style="padding:12px 14px 0;">
      ${activeTab==='receivable'?drawReceivable():drawPayable()}
    </div>
    <button class="fab" onclick="newEntry()" style="bottom:calc(var(--nav-h)+14px);">+</button>
  </div>
  ${renderNav('financeiro')}`;
}

function drawReceivable(){
  if(!receivables.length)return`<div class="empty"><div class="eico">💰</div><h3>Nenhuma conta a receber</h3><p>Os valores aparecem quando um serviço é finalizado</p></div>`;
  return receivables.map(r=>{
    const snap=r.services?.customer_snapshot||{};
    const pct=r.amount_due>0?Math.round(r.amount_received/r.amount_due*100):0;
    const chipCls=r.status==='received'?'chip-done':r.status==='partial'?'chip-part':'chip-pend';
    const chipLbl=r.status==='received'?'Recebido':r.status==='partial'?`Parcial ${pct}%`:'Pendente';
    return `<div class="fin-card ${r.status==='received'?'paid':''}">
      <div class="fin-row">
        <div>
          <div class="fin-name">${snap.name||'—'}</div>
          <div class="fin-sub">Venc: ${fdate(r.due_date)} · <span class="pay-chip ${chipCls}">${chipLbl}</span></div>
        </div>
        <div class="fin-amt" style="color:var(--ok);">${fmt(r.amount_due)}</div>
      </div>
      ${r.status!=='received'?`<div class="fin-actions">
        <button class="btn bp btn-sm" onclick="registerPayment(${r.id},${r.amount_due},${r.amount_received})">💳 Registrar pagamento</button>
      </div>`:'<div style="font-size:11px;color:var(--ok);margin-top:8px;">✓ Pagamento confirmado</div>'}
    </div>`;
  }).join('');
}

function drawPayable(){
  const pending=payables.filter(p=>!p.is_paid);
  const paid=payables.filter(p=>p.is_paid);
  const all=[...pending,...paid];
  if(!all.length)return`<div class="empty"><div class="eico">📄</div><h3>Nenhuma despesa</h3><p>Toque em + para adicionar uma despesa</p></div>`;
  return all.map(p=>{
    const catLabel={material:'📦 Material',fuel:'⛽ Combustível',tools:'🔧 Ferramentas',rent:'🏠 Aluguel',internet:'📶 Internet',other:'📌 Outros'}[p.category]||p.category;
    const recLabel=p.recurrence==='fixed'?'🔁 Fixa':'1× Variável';
    return `<div class="fin-card ${p.is_paid?'paid':''}">
      <div class="fin-row">
        <div>
          <div class="fin-name">${p.description}</div>
          <div class="fin-sub">${catLabel} · ${recLabel} · Venc: ${fdate(p.due_date)}</div>
        </div>
        <div class="fin-amt" style="color:var(--err);">${fmt(p.amount)}</div>
      </div>
      ${!p.is_paid?`<div class="fin-actions">
        <button class="btn bok btn-sm" onclick="markPaid(${p.id})">✓ Marcar como pago</button>
        <button class="btn berr btn-sm" onclick="deletePayable(${p.id})">🗑️</button>
      </div>`:'<div style="font-size:11px;color:var(--ok);margin-top:8px;">✓ Pago em ${fdate(p.paid_at)}</div>'}
    </div>`;
  }).join('');
}

function setTab(t){activeTab=t;draw();}

async function registerPayment(recvId,due,received){
  const remaining=due-received;
  const amtStr=prompt(`Valor recebido (restante: ${fmt(remaining)}):`,remaining.toFixed(2));
  if(!amtStr)return;
  const amt=parseFloat(amtStr);
  if(isNaN(amt)||amt<=0){toast('Valor inválido','err');return;}
  const method=prompt('Método (pix/cash/debit/credit/transfer):','pix');
  const newTotal=received+amt;
  const newStatus=newTotal>=due?'received':newTotal>0?'partial':'pending';
  await sb.from('accounts_receivable').update({amount_received:newTotal,status:newStatus}).eq('id',recvId);
  await sb.from('payments').insert([{receivable_id:recvId,owner_id:currentUser.id,amount:amt,payment_method:method||'pix',paid_at:new Date().toISOString().split('T')[0],created_by_id:currentUser.id}]);
  toast('Pagamento registrado!','ok');
  await loadAll();draw();
}

async function markPaid(id){
  const method=prompt('Método de pagamento (pix/cash/debit/credit/transfer):','pix');
  await sb.from('accounts_payable').update({is_paid:true,paid_at:new Date().toISOString().split('T')[0],payment_method:method||'pix'}).eq('id',id);
  toast('Marcado como pago!','ok');
  await loadAll();draw();
}

async function deletePayable(id){
  if(!confirm('Excluir esta despesa?'))return;
  await sb.from('accounts_payable').delete().eq('id',id);
  toast('Despesa excluída','ok');
  await loadAll();draw();
}

function newEntry(){
  // Modal simples via prompt
  const desc=prompt('Descrição da despesa:');if(!desc)return;
  const amt=parseFloat(prompt('Valor R$:'));if(isNaN(amt)||amt<=0)return;
  const cat=prompt('Categoria (material/fuel/tools/rent/internet/other):','other');
  const rec=prompt('Fixa (fixed) ou variável (variable)?','variable');
  const due=prompt('Data de vencimento (AAAA-MM-DD):',new Date().toISOString().split('T')[0]);
  sb.from('accounts_payable').insert([{owner_id:currentUser.id,description:desc,amount:amt,category:cat||'other',recurrence:rec||'variable',due_date:due,created_by_id:currentUser.id}]).then(()=>{toast('Despesa adicionada!','ok');loadAll().then(draw);});
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Cliente</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.ctabs{display:flex;border-bottom:1px solid var(--bdr);}
.ctab{flex:1;padding:10px;border:none;background:none;color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;}
.ctab.on{color:var(--acc);border-bottom-color:var(--acc);}
.eq-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:8px;}
.eq-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--txt2);}
.eq-row span:last-child{color:var(--txt);font-weight:500;}
.volt-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.volt-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.volt-chip.sel{border-color:var(--acc);background:rgba(0,191,255,.1);color:var(--acc);}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
const params=new URLSearchParams(window.location.search);
const custId=params.get('id');
let activeTab='info', selVolt='220v', showVoltOther=false;

(async()=>{
  if(!custId){nav('clientes.html');return;}
  const ok=await requireAuth();if(!ok)return;
  await renderPage();
})();

async function renderPage(){
  const[{data:c},{data:qs},{data:eqs}]=await Promise.all([
    sb.from('customers').select('*').eq('id',custId).single(),
    sb.from('quotes').select('id,sequence,year,status,total_price,created_at').eq('customer_id',custId).eq('owner_id',currentUser.id).order('created_at',{ascending:false}).limit(10),
    sb.from('equipments').select('*').eq('customer_id',custId).eq('owner_id',currentUser.id).eq('is_active',true),
  ]);
  if(!c){toast('Cliente não encontrado','err');nav('clientes.html');return;}
  const levelIco={bronze:'🥉',silver:'🥈',gold:'🥇',vip:'💎'};

  const infoHtml=`
    ${c.phone?`<div class="drow"><span class="dlbl">📞 Telefone</span><span class="dval"><a class="tel" href="tel:${c.phone}">${c.phone}</a> &nbsp;<a class="tel" href="https://wa.me/55${c.phone.replace(/\D/g,'')}" target="_blank">💬</a></span></div>`:''}
    ${c.email?`<div class="drow"><span class="dlbl">✉️ E-mail</span><span class="dval"><a class="tel" href="mailto:${c.email}">${c.email}</a></span></div>`:''}
    ${c.document?`<div class="drow"><span class="dlbl">📄 Documento</span><span class="dval">${c.document}</span></div>`:''}
    ${c.city?`<div class="drow"><span class="dlbl">📍 Cidade</span><span class="dval">${c.city}${c.state?'/'+c.state:''}</span></div>`:''}
    ${c.street?`<div class="drow"><span class="dlbl">🏠 Endereço</span><span class="dval">${c.street}, ${c.number||'S/N'}${c.complement?' — '+c.complement:''}</span></div>`:''}
    ${c.notes?`<div class="drow"><span class="dlbl">📝 Obs.</span><span class="dval" style="font-style:italic;">${c.notes}</span></div>`:''}`;

  const typeLabel={hi_wall:'Hi Wall',piso_teto:'Piso Teto',cassete:'Cassete',janela:'Janela',portatil:'Portátil',outro:'Outro'};
  const eqHtml=eqs?.length?eqs.map(e=>`
    <div class="eq-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div style="font-size:14px;font-weight:700;">${typeLabel[e.equipment_type]||e.equipment_type||'Equipamento'}</div>
        <div style="display:flex;gap:8px;">
          <button style="background:none;border:none;color:var(--acc);font-size:14px;cursor:pointer;" onclick="editEq(${e.id})">✏️</button>
          <button style="background:none;border:none;color:var(--err);font-size:14px;cursor:pointer;" onclick="deleteEq(${e.id})">🗑️</button>
        </div>
      </div>
      ${e.location_note?`<div class="eq-row"><span>Local</span><span>${e.location_note}</span></div>`:''}
      ${e.brand||e.model?`<div class="eq-row"><span>Modelo</span><span>${[e.brand,e.model].filter(Boolean).join(' ')}</span></div>`:''}
      ${e.evaporator_model?`<div class="eq-row"><span>Evaporador</span><span>${e.evaporator_model}</span></div>`:''}
      ${e.condenser_model?`<div class="eq-row"><span>Condensador</span><span>${e.condenser_model}</span></div>`:''}
      ${e.capacity_btu?`<div class="eq-row"><span>Capacidade</span><span>${e.capacity_btu.toLocaleString()} BTU</span></div>`:''}
      ${e.refrigerant?`<div class="eq-row"><span>Fluido</span><span>${e.refrigerant.toUpperCase()}</span></div>`:''}
      ${(e.voltage_text||e.voltage)?`<div class="eq-row"><span>Voltagem</span><span>${e.voltage_text||e.voltage}</span></div>`:''}
      ${e.serial_number?`<div class="eq-row"><span>N° Série</span><span>${e.serial_number}</span></div>`:''}
    </div>`).join(''):`<div style="font-size:13px;color:var(--txt2);padding:4px 0 12px;">Nenhum equipamento cadastrado</div>`;

  const qHtml=qs?.length?qs.map(q=>`
    <div class="li" onclick="nav('orcamento.html?id=${q.id}')">
      <div class="av" style="font-size:11px;">#${q.sequence}</div>
      <div class="li-info"><div class="li-name">${fmt(q.total_price)}</div><div class="li-sub">${fdate(q.created_at)}</div></div>
      <span class="${sBadgeClass(q.status)}">${sLabel(q.status)}</span>
    </div>`).join(''):`<div style="padding:14px;font-size:13px;color:var(--txt2);">Nenhum orçamento</div>`;

  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="nav('clientes.html')">←</button>
      <h1>${c.name}</h1>
      <button class="hdr-btn" onclick="nav('cliente-novo.html?id=${c.id}')">✏️</button>
    </div>
    <div style="padding:16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--bdr);">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--bg3);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:var(--acc);">${initials(c.name)}</div>
      <div><div style="font-size:17px;font-weight:700;">${levelIco[c.level]||''} ${c.name}</div><div style="font-size:12px;color:var(--txt2);">${c.company||'Pessoa física'}</div></div>
    </div>
    <div class="ctabs">
      <button class="ctab ${activeTab==='info'?'on':''}" onclick="activeTab='info';renderPage()">Dados</button>
      <button class="ctab ${activeTab==='eq'?'on':''}" onclick="activeTab='eq';renderPage()">Equipamentos (${eqs?.length||0})</button>
      <button class="ctab ${activeTab==='qs'?'on':''}" onclick="activeTab='qs';renderPage()">Orçamentos (${qs?.length||0})</button>
    </div>
    <div id="tabContent" style="padding:14px;">
      ${activeTab==='info'?infoHtml:activeTab==='eq'?`${eqHtml}<button class="btn bp" style="margin-top:10px;" onclick="showAddEq()">+ Adicionar equipamento</button>`:qHtml}
    </div>
    ${activeTab==='qs'?`<div style="padding:0 14px 24px;"><button class="btn bp" onclick="nav('orcamento-novo.html?customer_id=${c.id}')">+ Novo orçamento</button></div>`:''}
  </div>`;
}

function showAddEq(editData){
  const eq=editData||{};
  const AC_TYPES=[{v:'hi_wall',l:'Hi Wall'},{v:'piso_teto',l:'Piso Teto'},{v:'cassete',l:'Cassete'},{v:'janela',l:'Janela'},{v:'portatil',l:'Portátil'},{v:'outro',l:'Outro'}];
  const BTUS=[9000,12000,18000,24000,30000,36000,48000,60000];
  const REFS=['r22','r32','r410a','r407c','r134a','r141b','outro'];
  const VOLTS=['127v','220v','380v','440v','outro'];
  const currentVolt=eq.voltage_text||selVolt;
  const isOther=!VOLTS.slice(0,-1).includes(currentVolt);

  const tc=document.getElementById('tabContent'); if(!tc)return;
  tc.innerHTML=`
  <div class="card">
    <div class="card-title">${editData?'✏️ Editar Equipamento':'➕ Novo Equipamento'}</div>
    <div class="fg"><label class="fl">Local de instalação</label>
      <input class="fi" id="eLocation" value="${eq.location_note||''}" placeholder="Ex: Sala, Quarto principal"></div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Tipo</label>
      <select class="fs" id="eType">${AC_TYPES.map(t=>`<option value="${t.v}" ${(eq.equipment_type||'hi_wall')===t.v?'selected':''}>${t.l}</option>`).join('')}</select></div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Capacidade BTU</label>
      <select class="fs" id="eBtu">${BTUS.map(b=>`<option value="${b}" ${eq.capacity_btu===b?'selected':''}>${b.toLocaleString()}</option>`).join('')}</select></div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Marca</label>
      <input class="fi" id="eBrand" value="${eq.brand||''}" placeholder="Ex: Midea, Daikin, Samsung"></div>
    <div class="fr" style="margin-top:8px;">
      <div class="fg"><label class="fl">Modelo evaporador</label><input class="fi" id="eEvap" value="${eq.evaporator_model||''}" placeholder="Modelo"></div>
      <div class="fg"><label class="fl">Modelo condensador</label><input class="fi" id="eCond" value="${eq.condenser_model||''}" placeholder="Modelo"></div>
    </div>
    <div class="fg" style="margin-top:8px;"><label class="fl">N° Série</label>
      <input class="fi" id="eSerial" value="${eq.serial_number||''}" placeholder="Número de série"></div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Fluido refrigerante</label>
      <select class="fs" id="eRef">${REFS.map(r=>`<option value="${r}" ${(eq.refrigerant||'r410a')===r?'selected':''}>${r.toUpperCase()}</option>`).join('')}</select></div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Voltagem</label>
      <div class="volt-chips" id="voltChips">
        ${VOLTS.map(v=>`<div class="volt-chip ${(isOther&&v==='outro')||currentVolt===v?'sel':''}" onclick="selectVolt('${v}')">${v==='outro'?'Outro ✎':v}</div>`).join('')}
      </div>
      <input class="fi" id="voltOther" placeholder="Ex: 380v, 440v, 460v" style="margin-top:6px;display:${(isOther||currentVolt==='outro')?'block':'none'};" value="${isOther?currentVolt:''}">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;">
      <button class="btn bs" onclick="renderPage()">Cancelar</button>
      <button class="btn bp" onclick="saveEq(${editData?editData.id:'null'})">✓ Salvar</button>
    </div>
  </div>`;
}

function selectVolt(v){
  selVolt=v;
  document.querySelectorAll('.volt-chip').forEach(el=>{
    el.classList.toggle('sel',el.textContent.startsWith(v.replace('outro','Outro')));
  });
  const other=document.getElementById('voltOther');
  if(other) other.style.display=v==='outro'?'block':'none';
}

async function editEq(id){
  const{data:eq}=await sb.from('equipments').select('*').eq('id',id).single();
  if(!eq)return;
  const volts=['127v','220v','380v','440v'];
  const vt=eq.voltage_text||eq.voltage||'220v';
  selVolt=volts.includes(vt)?vt:'outro';
  showAddEq(eq);
}

async function saveEq(editId){
  const voltVal=selVolt==='outro'?(document.getElementById('voltOther')?.value?.trim()||'outro'):selVolt;
  const payload={
    customer_id:parseInt(custId),owner_id:currentUser.id,
    location_note:val('eLocation'),
    equipment_type:document.getElementById('eType')?.value||'hi_wall',
    capacity_btu:parseInt(document.getElementById('eBtu')?.value)||9000,
    brand:val('eBrand'),
    evaporator_model:val('eEvap'),
    condenser_model:val('eCond'),
    serial_number:val('eSerial'),
    refrigerant:document.getElementById('eRef')?.value||'r410a',
    voltage_text:voltVal,
    is_active:true,
    updated_at:new Date().toISOString(),
  };
  let error;
  if(editId&&editId!=='null'){
    const r=await sb.from('equipments').update(payload).eq('id',editId);error=r.error;
  } else {
    payload.created_by_id=currentUser.id;
    const r=await sb.from('equipments').insert([payload]);error=r.error;
  }
  if(error){toast('Erro: '+error.message,'err');return;}
  toast('Equipamento salvo!','ok');
  selVolt='220v';
  renderPage();
}

async function deleteEq(id){
  if(!confirm('Excluir equipamento?'))return;
  await sb.from('equipments').update({is_active:false}).eq('id',id);
  toast('Excluído','ok');renderPage();
}
</script>
</body>
</html>

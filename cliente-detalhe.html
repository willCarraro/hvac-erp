<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>ARCLASS — Cliente</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const custId = params.get('id');

(async () => {
  if (!custId) { nav('clientes.html'); return; }
  const ok = await requireAuth();
  if (!ok) return;

  const [{ data: c }, { data: qs }, { data: eqs }] = await Promise.all([
    sb.from('customers').select('*').eq('id', custId).single(),
    sb.from('quotes').select('id,sequence,year,status,total_price,created_at').eq('customer_id', custId).order('created_at', { ascending: false }).limit(10),
    sb.from('equipments').select('*').eq('customer_id', custId).eq('is_active', true),
  ]);

  if (!c) { toast('Cliente não encontrado', 'err'); nav('clientes.html'); return; }

  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="nav('clientes.html')">←</button>
      <h1>${c.name}</h1>
      <button class="hdr-btn" onclick="nav('cliente-novo.html?id=${c.id}')">✏️</button>
    </div>

    <!-- Perfil -->
    <div style="padding:16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--bdr);">
      <div style="width:56px;height:56px;border-radius:50%;background:var(--bg3);border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--acc);flex-shrink:0;">
        ${initials(c.name)}
      </div>
      <div>
        <div style="font-size:18px;font-weight:700;">${c.name}</div>
        <div style="font-size:12px;color:var(--txt2);">${c.company || 'Pessoa física'}</div>
      </div>
    </div>

    <!-- Contato -->
    <div style="padding:0 14px;">
      ${c.phone ? `<div class="drow"><span class="dlbl">📞 Telefone</span><span class="dval"><a class="tel" href="tel:${c.phone}">${c.phone}</a> &nbsp;<a class="tel" href="https://wa.me/55${c.phone.replace(/\D/g,'')}" target="_blank">💬</a></span></div>` : ''}
      ${c.email ? `<div class="drow"><span class="dlbl">✉️ E-mail</span><span class="dval"><a class="tel" href="mailto:${c.email}">${c.email}</a></span></div>` : ''}
      ${c.document ? `<div class="drow"><span class="dlbl">📄 Documento</span><span class="dval">${c.document}</span></div>` : ''}
      ${c.city ? `<div class="drow"><span class="dlbl">📍 Cidade</span><span class="dval">${c.city}${c.state ? '/' + c.state : ''}</span></div>` : ''}
      ${c.street ? `<div class="drow"><span class="dlbl">🏠 Endereço</span><span class="dval">${c.street}, ${c.number || 'S/N'}${c.complement ? ' – ' + c.complement : ''}</span></div>` : ''}
      ${c.district ? `<div class="drow"><span class="dlbl">🏘️ Bairro</span><span class="dval">${c.district}</span></div>` : ''}
      ${c.notes ? `<div class="drow"><span class="dlbl">📝 Obs.</span><span class="dval" style="font-style:italic;">${c.notes}</span></div>` : ''}
    </div>

    <!-- Equipamentos -->
    <div class="sec-hdr">
      <div class="sec-title">🧊 Equipamentos</div>
    </div>
    <div style="padding:0 14px 4px;">
      ${eqs && eqs.length ? eqs.map(e => `
        <div class="card" style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:13px;font-weight:600;">${e.brand || '—'} ${e.model || ''}</div>
            <div style="font-size:11px;color:var(--txt2);">${e.capacity_btu ? e.capacity_btu.toLocaleString() + ' BTU' : ''}${e.location_note ? ' · ' + e.location_note : ''}</div>
          </div>
          <div style="font-size:11px;color:var(--txt2);">${e.serial_number || ''}</div>
        </div>`).join('') :
        `<div style="font-size:13px;color:var(--txt2);padding:4px 0 12px;">Nenhum equipamento cadastrado</div>`}
    </div>

    <!-- Orçamentos -->
    <div class="sec-hdr">
      <div class="sec-title">📋 Orçamentos</div>
      <button class="btn bp btn-sm" onclick="nav('orcamento-novo.html?customer_id=${c.id}')">+ Novo</button>
    </div>
    ${qs && qs.length ? qs.map(q => `
      <div class="li" onclick="nav('orcamento.html?id=${q.id}')">
        <div class="av" style="font-size:11px;">#${q.sequence}/${q.year}</div>
        <div class="li-info">
          <div class="li-name">${fmt(q.total_price)}</div>
          <div class="li-sub">${fdate(q.created_at)}</div>
        </div>
        <span class="${sBadgeClass(q.status)}">${sLabel(q.status)}</span>
      </div>`).join('') :
      `<div style="padding:14px;font-size:13px;color:var(--txt2);">Nenhum orçamento ainda.</div>`}

    <div style="padding:14px 14px 24px;">
      <button class="btn bs" onclick="nav('orcamento-novo.html?customer_id=${c.id}')">📋 Criar orçamento</button>
    </div>
  </div>`;
})();
</script>
</body>
</html>

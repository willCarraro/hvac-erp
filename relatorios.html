<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"><meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923"><title>MeuGestHVAC — Relatórios</title><link rel="stylesheet" href="css/style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.period-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.period-bar::-webkit-scrollbar{display:none;}
.pchip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.pchip.on{border-color:var(--acc);background:rgba(0,191,255,.12);color:var(--acc);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px;}
.kpi-lbl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.kpi-val{font-size:22px;font-weight:800;}
.kpi-sub{font-size:11px;color:var(--txt2);margin-top:4px;}
.rep-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px;}
.rep-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:12px;color:var(--txt2);width:90px;flex-shrink:0;}
.bar-track{flex:1;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--acc);transition:width .5s ease;}
.bar-val{font-size:12px;font-weight:700;width:70px;text-align:right;flex-shrink:0;}
</style>
</head>
<body><div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
let period='month', selMonth=new Date().getMonth(), selYear=new Date().getFullYear();
let data={quotes:[],payments:[],payables:[]};

(async()=>{
  const ok=await requireAuth();if(!ok)return;
  await loadData();draw();
})();

async function loadData(){
  let from,to;
  const now=new Date();
  if(period==='month'){from=new Date(selYear,selMonth,1);to=new Date(selYear,selMonth+1,0);}
  else if(period==='year'){from=new Date(selYear,0,1);to=new Date(selYear,11,31);}
  else{from=new Date(now.getFullYear(),now.getMonth(),now.getDate());to=from;}
  const fs=from.toISOString().split('T')[0],ts=to.toISOString().split('T')[0];
  const[q,p,py]=await Promise.all([
    sb.from('quotes').select('status,total_price,total_cost,estimated_profit,created_at').eq('owner_id',currentUser.id).gte('created_at',fs).lte('created_at',ts+'T23:59:59'),
    sb.from('payments').select('amount,paid_at,payment_method').eq('owner_id',currentUser.id).gte('paid_at',fs).lte('paid_at',ts),
    sb.from('accounts_payable').select('amount,is_paid,paid_at,category').eq('owner_id',currentUser.id).eq('is_paid',true).gte('paid_at',fs).lte('paid_at',ts),
  ]);
  data={quotes:q.data||[],payments:p.data||[],payables:py.data||[]};
}

function draw(){
  const totalRecv=data.payments.reduce((s,p)=>s+p.amount,0);
  const totalPay=data.payables.reduce((s,p)=>s+p.amount,0);
  const lucroLiq=totalRecv-totalPay;
  const totalOrc=data.quotes.length;
  const approved=data.quotes.filter(q=>['approved','scheduled','finished'].includes(q.status)).length;
  const conversion=totalOrc>0?Math.round(approved/totalOrc*100):0;
  const ticketMed=approved>0?data.quotes.filter(q=>['approved','scheduled','finished'].includes(q.status)).reduce((s,q)=>s+q.total_price,0)/approved:0;
  const maxPay=Math.max(...data.payables.map(p=>p.amount),1);
  const catTotals={};
  data.payables.forEach(p=>{catTotals[p.category]=(catTotals[p.category]||0)+p.amount;});
  const catLabels={material:'Material',fuel:'Combustível',tools:'Ferramentas',rent:'Aluguel',internet:'Internet',other:'Outros'};
  const pmTotals={};
  data.payments.forEach(p=>{pmTotals[p.payment_method]=(pmTotals[p.payment_method]||0)+p.amount;});
  const pmLabels={pix:'PIX',cash:'Dinheiro',debit:'Débito',credit:'Crédito',bank_slip:'Boleto',transfer:'Transferência'};
  const maxPm=Math.max(...Object.values(pmTotals),1);
  const periodLabel=period==='month'?`${MONTHS[selMonth]} ${selYear}`:period==='year'?`Ano ${selYear}`:'Hoje';
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr"><h1>📊 Relatórios</h1></div>
    <div class="period-bar">
      <div class="pchip ${period==='today'?'on':''}" onclick="setPeriod('today')">Hoje</div>
      ${MONTHS.map((m,i)=>`<div class="pchip ${period==='month'&&selMonth===i?'on':''}" onclick="setPeriod('month',${i})">${m}</div>`).join('')}
      <div class="pchip ${period==='year'?'on':''}" onclick="setPeriod('year')">Ano ${selYear}</div>
    </div>
    <div class="sec-hdr"><div class="sec-title">${periodLabel}</div></div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl">Receita confirmada</div><div class="kpi-val" style="color:var(--ok);">${fmt(totalRecv)}</div><div class="kpi-sub">${data.payments.length} pagamento(s)</div></div>
      <div class="kpi"><div class="kpi-lbl">Despesas pagas</div><div class="kpi-val" style="color:var(--err);">${fmt(totalPay)}</div><div class="kpi-sub">${data.payables.length} despesa(s)</div></div>
      <div class="kpi"><div class="kpi-lbl">Lucro líquido</div><div class="kpi-val" style="color:${lucroLiq>=0?'var(--acc)':'var(--err)'};">${fmt(lucroLiq)}</div><div class="kpi-sub">${lucroLiq>=0?'Positivo ✓':'Negativo ⚠️'}</div></div>
      <div class="kpi"><div class="kpi-lbl">Orçamentos</div><div class="kpi-val">${totalOrc}</div><div class="kpi-sub">Conversão: ${conversion}%</div></div>
      <div class="kpi"><div class="kpi-lbl">Ticket médio</div><div class="kpi-val" style="font-size:16px;">${fmt(ticketMed)}</div><div class="kpi-sub">${approved} aprovado(s)</div></div>
      <div class="kpi"><div class="kpi-lbl">Margem</div><div class="kpi-val" style="font-size:16px;">${totalRecv>0?Math.round(lucroLiq/totalRecv*100):0}%</div><div class="kpi-sub">Lucro / Receita</div></div>
    </div>
    ${Object.keys(catTotals).length?`
    <div style="padding:14px 14px 0;"><div class="rep-card">
      <div class="rep-title">Despesas por categoria</div>
      ${Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>`
        <div class="bar-row">
          <span class="bar-label">${catLabels[cat]||cat}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/totalPay*100)}%;background:var(--err);"></div></div>
          <span class="bar-val" style="color:var(--err);">${fmt(val)}</span>
        </div>`).join('')}
    </div></div>`:''}
    ${Object.keys(pmTotals).length?`
    <div style="padding:0 14px 14px;"><div class="rep-card">
      <div class="rep-title">Receita por forma de pagamento</div>
      ${Object.entries(pmTotals).sort((a,b)=>b[1]-a[1]).map(([pm,val])=>`
        <div class="bar-row">
          <span class="bar-label">${pmLabels[pm]||pm}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(val/maxPm*100)}%;"></div></div>
          <span class="bar-val" style="color:var(--acc);">${fmt(val)}</span>
        </div>`).join('')}
    </div></div>`:''}
    ${!data.payments.length&&!data.payables.length?'<div class="empty" style="padding-top:32px;"><div class="eico">📊</div><h3>Sem dados no período</h3><p>Selecione outro período ou registre movimentações financeiras</p></div>':''}
  </div>
  ${renderNav('relatorios')}`;
}

async function setPeriod(p,m){
  period=p;
  if(p==='month'&&m!==undefined)selMonth=m;
  await loadData();draw();
}
</script></body></html>

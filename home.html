<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Início</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
(async()=>{
  const ok=await requireAuth();if(!ok)return;
  const now=new Date();
  const h=now.getHours();
  const gr=h>=5&&h<12?'Bom dia':h>=12&&h<18?'Boa tarde':'Boa noite';
  const d=now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="welcome">
      <h2>Olá, <span>${firstName()}!</span></h2>
      <p>${gr} · ${d.charAt(0).toUpperCase()+d.slice(1)}</p>
    </div>
    <div class="dgrid" id="statsGrid">
      <div class="dcard" onclick="nav('clientes.html')"><div class="ico">👥</div><div class="val" id="stCust">—</div><div class="lbl">Clientes</div></div>
      <div class="dcard" onclick="nav('orcamentos.html')"><div class="ico">📋</div><div class="val" id="stQuote">—</div><div class="lbl">Orçamentos abertos</div></div>
      <div class="dcard" onclick="nav('financeiro.html')"><div class="ico">💰</div><div class="val" id="stRecv">—</div><div class="lbl">A receber</div></div>
      <div class="dcard" onclick="nav('orcamento-novo.html')"><div class="ico">⚡</div><div class="val" style="font-size:14px;margin-top:6px;line-height:1.3;">Novo Orçamento</div></div>
    </div>
    <div id="notifBanner"></div>
    <div class="sec-hdr" style="margin-top:8px;"><div class="sec-title">Últimos orçamentos</div><span class="sec-link" onclick="nav('orcamentos.html')">Ver todos →</span></div>
    <div id="recentList"><div style="padding:14px;font-size:13px;color:var(--txt2);">Carregando...</div></div>
    <div class="sec-hdr"><div class="sec-title">Agenda hoje</div></div>
    <div id="todayList"><div style="padding:14px;font-size:13px;color:var(--txt2);">Carregando...</div></div>
  </div>
  ${renderNav('home')}`;

  const [a,b,c,qs,apps,notifs]=await Promise.all([
    sb.from('customers').select('*',{count:'exact',head:true}).eq('owner_id',currentUser.id).eq('is_active',true),
    sb.from('quotes').select('*',{count:'exact',head:true}).eq('owner_id',currentUser.id).in('status',['draft','pending','to_send','sent','approved']),
    sb.from('accounts_receivable').select('*',{count:'exact',head:true}).eq('owner_id',currentUser.id).neq('status','received'),
    sb.from('quotes').select('id,sequence,year,status,total_price,created_at,customers(name)').eq('owner_id',currentUser.id).order('created_at',{ascending:false}).limit(5),
    sb.from('appointments').select('*,services(customer_snapshot)').eq('owner_id',currentUser.id).eq('scheduled_date',new Date().toISOString().split('T')[0]).order('scheduled_time'),
    sb.from('user_notifications').select('*').eq('owner_id',currentUser.id).eq('is_read',false).order('created_at',{ascending:false}).limit(5),
  ]);
  setEl('stCust',a.count||0);setEl('stQuote',b.count||0);setEl('stRecv',c.count||0);

  // Notificações
  const nb=document.getElementById('notifBanner');
  if(notifs.data?.length){
    nb.innerHTML=`<div onclick="nav('notificacoes.html')" style="background:rgba(243,156,18,.1);border:1px solid var(--warn);border-radius:10px;padding:10px 14px;margin:10px 14px 0;cursor:pointer;display:flex;align-items:center;gap:10px;">
      <span style="font-size:20px;">🔔</span>
      <div><div style="font-size:13px;font-weight:700;color:var(--warn);">${notifs.data.length} notificação(ões) não lida(s)</div>
      <div style="font-size:11px;color:var(--txt2);">${notifs.data[0]?.title||''}</div></div>
    </div>`;
  }

  const rl=document.getElementById('recentList');
  if(qs.data?.length){rl.innerHTML=qs.data.map(q=>`<div class="li" onclick="nav('orcamento.html?id=${q.id}')"><div class="av" style="font-size:11px;">#${q.sequence}</div><div class="li-info"><div class="li-name">${q.customers?.name||'—'}</div><div class="li-sub">${fmt(q.total_price)} · ${fdate(q.created_at)}</div></div><span class="${sBadgeClass(q.status)}">${sLabel(q.status)}</span></div>`).join('');}
  else rl.innerHTML='<div style="padding:14px;font-size:13px;color:var(--txt2);">Nenhum orçamento ainda</div>';

  const tl=document.getElementById('todayList');
  if(apps.data?.length){tl.innerHTML=apps.data.map(a=>{const snap=a.services?.customer_snapshot||{};return`<div class="li"><div class="av">🔧</div><div class="li-info"><div class="li-name">${snap.name||'Cliente'}</div><div class="li-sub">${a.scheduled_time?a.scheduled_time.slice(0,5):'Horário a definir'}${a.notes?' · '+a.notes:''}</div></div></div>`;}).join('');}
  else tl.innerHTML='<div style="padding:14px;font-size:13px;color:var(--txt2);">Sem agendamentos hoje</div>';
})();
</script>
</body>
</html>

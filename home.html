<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>ARCLASS — Início</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
(async () => {
  const ok = await requireAuth();
  if (!ok) return;

  const h = new Date().getHours();
  const gr = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
  const d = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="welcome">
      <h2>${gr}, <span>${firstName()}!</span></h2>
      <p>${d.charAt(0).toUpperCase() + d.slice(1)}</p>
    </div>

    <div class="dgrid" id="statsGrid">
      <div class="dcard"><div class="ico">👥</div><div class="val" id="stCust">—</div><div class="lbl">Clientes</div></div>
      <div class="dcard"><div class="ico">📋</div><div class="val" id="stQuote">—</div><div class="lbl">Orçamentos abertos</div></div>
      <div class="dcard"><div class="ico">💰</div><div class="val" id="stRecv">—</div><div class="lbl">A receber</div></div>
      <div class="dcard" onclick="nav('orcamento-novo.html')" style="cursor:pointer;">
        <div class="ico">⚡</div>
        <div class="val" style="font-size:15px;margin-top:6px;line-height:1.3;">Novo Orçamento</div>
      </div>
    </div>

    <div class="sec-hdr" style="margin-top:8px;">
      <div class="sec-title">Últimos orçamentos</div>
      <span class="sec-link" onclick="nav('orcamentos.html')">Ver todos →</span>
    </div>
    <div id="recentList"><div style="padding:14px;font-size:13px;color:var(--txt2);">Carregando...</div></div>

    <div class="sec-hdr">
      <div class="sec-title">Agenda de hoje</div>
    </div>
    <div id="todayList"><div style="padding:14px;font-size:13px;color:var(--txt2);">Carregando...</div></div>
  </div>
  ${renderNav('home')}`;

  // Carregar stats
  const [a, b, c] = await Promise.all([
    sb.from('customers').select('*', { count: 'exact', head: true }).eq('is_active', true),
    sb.from('quotes').select('*', { count: 'exact', head: true }).in('status', ['draft', 'pending', 'to_send', 'sent', 'approved']),
    sb.from('accounts_receivable').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
  ]);
  setEl('stCust',  a.count || 0);
  setEl('stQuote', b.count || 0);
  setEl('stRecv',  c.count || 0);

  // Últimos orçamentos
  const { data: qs } = await sb.from('quotes')
    .select('id, sequence, year, status, total_price, created_at, customers(name)')
    .order('created_at', { ascending: false }).limit(5);

  const rl = document.getElementById('recentList');
  if (qs && qs.length) {
    rl.innerHTML = qs.map(q => `
      <div class="li" onclick="nav('orcamento.html?id=${q.id}')">
        <div class="av" style="font-size:11px;">#${q.sequence}</div>
        <div class="li-info">
          <div class="li-name">${q.customers?.name || '—'}</div>
          <div class="li-sub">${fmt(q.total_price)} · ${fdate(q.created_at)}</div>
        </div>
        <span class="${sBadgeClass(q.status)}">${sLabel(q.status)}</span>
      </div>`).join('');
  } else {
    rl.innerHTML = `<div style="padding:14px;font-size:13px;color:var(--txt2);">Nenhum orçamento ainda.</div>`;
  }

  // Agenda hoje
  const today = new Date().toISOString().split('T')[0];
  const { data: apps } = await sb.from('appointments')
    .select('id, scheduled_time, services(id, customer_snapshot)')
    .eq('scheduled_date', today).order('scheduled_time');

  const tl = document.getElementById('todayList');
  if (apps && apps.length) {
    tl.innerHTML = apps.map(a => {
      const snap = a.services?.customer_snapshot || {};
      const name = snap.name || 'Cliente';
      const time = a.scheduled_time ? a.scheduled_time.slice(0, 5) : '—';
      return `<div class="li">
        <div class="av">🔧</div>
        <div class="li-info">
          <div class="li-name">${name}</div>
          <div class="li-sub">${time}</div>
        </div>
      </div>`;
    }).join('');
  } else {
    tl.innerHTML = `<div style="padding:14px;font-size:13px;color:var(--txt2);">Sem serviços agendados hoje.</div>`;
  }
})();
</script>
</body>
</html>

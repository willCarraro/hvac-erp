<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Corretiva</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.add-btn{background:rgba(0,191,255,.1);border:1.5px dashed var(--acc);border-radius:10px;padding:12px;width:100%;color:var(--acc);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.part-form{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px;}
.part-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.part-del{background:none;border:none;color:var(--err);font-size:16px;cursor:pointer;}
.toggle-box{background:var(--bg2);border:1.5px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color .2s;}
.toggle-box.active{border-color:var(--acc);}
.toggle-hdr{display:flex;align-items:center;gap:12px;cursor:pointer;}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--bdr);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer;}
.chk.on{border-color:var(--acc);background:var(--acc);}
.chk.on::after{content:'✓';color:#0F1923;font-size:13px;font-weight:800;}
.toggle-body{margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr);}
.footer-card{background:var(--bg3);border-radius:12px;padding:14px;}
.frow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid var(--bdr);}
.frow:last-child{border-bottom:none;}
.frow-lbl{color:var(--txt2);}
.frow-val{font-weight:600;}
.f-total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px;border-top:2px solid var(--bdr);margin-top:4px;}
.f-total-lbl{font-size:16px;font-weight:800;}
.f-total-val{font-size:22px;font-weight:800;color:var(--acc);}
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script><script src="js/calc.js"></script>
<script>
const params=new URLSearchParams(window.location.search);
const custId=params.get('customer_id');
const UNITS=['metro','unidade','conjunto','kg','litro','par','rolo','m²','hora'];
const GAS_TYPES=['R22','R32','R410a','R407c','R134a','R141b'];

let customer=null, parts=[], showForm=false;
let hasGas=false, hasN2=false, hasUrgency=false, hasVisit=false;

(async()=>{
  const ok=await requireAuth(); if(!ok)return;
  if(!custId){nav('orcamento-novo.html');return;}
  const{data}=await sb.from('customers').select('id,name').eq('id',custId).single();
  customer=data; draw();
})();

function draw(){
  const cfg=financeConfig||{};
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr"><button class="back-btn" onclick="history.back()">←</button><h1>⚡ Corretiva</h1></div>
    <div class="fp">
      <div style="background:rgba(0,191,255,.08);border:1.5px solid var(--acc);border-radius:10px;padding:10px 14px;margin-bottom:14px;">
        <div style="font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;">Cliente</div>
        <div style="font-size:15px;font-weight:700;margin-top:2px;">${customer?.name||'—'}</div>
      </div>

      <div class="fg"><label class="fl">Descrição dos serviços *</label>
        <textarea class="fta" id="qDesc" placeholder="Descreva o problema encontrado e os serviços realizados..."></textarea></div>

      <!-- OPÇÕES -->
      <div class="fsec">Opções do serviço</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
        <div class="toggle-box ${hasVisit?'active':''}" onclick="hasVisit=!hasVisit;draw()">
          <div class="toggle-hdr">
            <div class="chk ${hasVisit?'on':''}"></div>
            <div><div style="font-size:13px;font-weight:600;">Taxa de visita</div><div style="font-size:11px;color:var(--txt2);">${fmt(cfg.visit_fee||80)}</div></div>
          </div>
        </div>
        <div class="toggle-box ${hasUrgency?'active':''}" onclick="hasUrgency=!hasUrgency;draw()">
          <div class="toggle-hdr">
            <div class="chk ${hasUrgency?'on':''}"></div>
            <div><div style="font-size:13px;font-weight:600;">Urgência</div><div style="font-size:11px;color:var(--txt2);">+${cfg.urgency_surcharge||50}%</div></div>
          </div>
        </div>
      </div>

      <!-- PEÇAS -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:14px;font-weight:700;">🔩 Peças</div>
        <div style="font-size:11px;color:var(--txt2);">Margem: ${cfg.parts_margin||30}%</div>
      </div>
      <div id="partList"></div>
      ${showForm ? partFormHtml() : `<button class="add-btn" onclick="showForm=true;draw()">+ Adicionar peça</button>`}

      <!-- GÁS -->
      <div class="toggle-box ${hasGas?'active':''}" style="margin-bottom:10px;">
        <div class="toggle-hdr" onclick="hasGas=!hasGas;draw()">
          <div class="chk ${hasGas?'on':''}"></div>
          <span style="font-size:14px;font-weight:700;">💨 Gás refrigerante</span>
        </div>
        ${hasGas?`<div class="toggle-body">
          <div class="fg"><label class="fl">Tipo de gás</label>
            <select class="fs" id="gasType" onchange="updateFooter()">${GAS_TYPES.map(g=>`<option>${g}</option>`).join('')}</select></div>
          <div class="fr" style="margin-top:8px;">
            <div class="fg"><label class="fl">Quantidade (kg)</label>
              <input class="fi" id="gasKg" type="number" value="0" step="0.1" min="0" inputmode="decimal" oninput="updateFooter()"></div>
            <div class="fg"><label class="fl">Custo por kg R$</label>
              <input class="fi" id="gasCostKg" type="number" value="0" step="10" min="0" inputmode="decimal" oninput="updateFooter()"></div>
          </div>
          <div style="font-size:11px;color:var(--txt2);margin-top:6px;">Margem aplicada: ${cfg.gas_margin||25}%</div>
        </div>`:''}
      </div>

      <!-- NITROGÊNIO -->
      <div class="toggle-box ${hasN2?'active':''}" style="margin-bottom:10px;">
        <div class="toggle-hdr" onclick="hasN2=!hasN2;draw()">
          <div class="chk ${hasN2?'on':''}"></div>
          <span style="font-size:14px;font-weight:700;">🔵 Nitrogênio</span>
        </div>
        ${hasN2?`<div class="toggle-body">
          <div class="fr">
            <div class="fg"><label class="fl">Quantidade (m³)</label>
              <input class="fi" id="n2M3" type="number" value="0" step="0.1" min="0" inputmode="decimal" oninput="updateFooter()"></div>
            <div class="fg"><label class="fl">Custo R$</label>
              <input class="fi" id="n2Cost" type="number" value="0" step="5" min="0" inputmode="decimal" oninput="updateFooter()"></div>
          </div>
          <div style="font-size:11px;color:var(--txt2);margin-top:6px;">Margem aplicada: ${cfg.gas_margin||25}%</div>
        </div>`:''}
      </div>

      <!-- HORA TÉCNICA -->
      <div class="fsec">Hora técnica</div>
      <div class="fg"><label class="fl">Horas trabalhadas</label>
        <input class="fi" id="qLh" type="number" value="0" step="0.5" min="0" inputmode="decimal" oninput="updateFooter()"></div>
      <div style="font-size:11px;color:var(--txt2);margin-top:4px;">
        ${fmt(cfg.hourly_rate||150)}/h · Piso mínimo: ${fmt(cfg.min_corrective_fee||250)}
      </div>

      <!-- DESCONTO -->
      <div class="fsec">Desconto</div>
      <div class="disc-grid">
        <div class="fg"><label class="fl">Em %</label>
          <input class="fi" id="discPct" type="number" value="0" step="1" min="0" max="100" inputmode="decimal" oninput="syncDisc('pct')"></div>
        <div class="fg"><label class="fl">Em R$</label>
          <input class="fi" id="discVal" type="number" value="0" step="10" min="0" inputmode="decimal" oninput="syncDisc('val')"></div>
      </div>

      <div class="fg" style="margin-top:10px;"><label class="fl">Observações para o cliente</label>
        <textarea class="fta" id="qNotes" placeholder="Causa do problema, garantia..."></textarea></div>

      <div class="fsec">Resumo financeiro</div>
      <div class="footer-card" id="footerCard"></div>

      <div id="qErr" style="margin-top:12px;"></div>
      <button class="btn bp" id="savebtn" style="margin-top:14px;" onclick="doSave()">✓ Salvar Orçamento</button>
    </div>
  </div>`;
  renderPartList(); updateFooter();
}

function partFormHtml(){
  return `<div class="part-form">
    <div class="fg"><label class="fl">Nome da peça *</label>
      <input class="fi" id="pName" placeholder="Ex: Capacitor 25µF"></div>
    <div class="fr" style="margin-top:8px;">
      <div class="fg"><label class="fl">Quantidade</label>
        <input class="fi" id="pQty" type="number" value="1" step="1" min="1" inputmode="numeric"></div>
      <div class="fg"><label class="fl">Unidade</label>
        <select class="fs" id="pUnit">${UNITS.map(u=>`<option>${u}</option>`).join('')}</select></div>
    </div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Custo da peça R$</label>
      <input class="fi" id="pCost" type="number" value="0" step="1" min="0" inputmode="decimal"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
      <button class="btn bs" onclick="showForm=false;draw()">Cancelar</button>
      <button class="btn bp" onclick="addPart()">+ Adicionar</button>
    </div>
  </div>`;
}

function addPart(){
  const name=document.getElementById('pName')?.value?.trim();
  const qty=parseFloat(document.getElementById('pQty')?.value)||1;
  const unit=document.getElementById('pUnit')?.value||'unidade';
  const cost=parseFloat(document.getElementById('pCost')?.value)||0;
  if(!name){toast('Informe o nome da peça','err');return;}
  const mg=(financeConfig?.parts_margin||30);
  const sell=roundMoney(cost*(1+mg/100));
  parts.push({id:Date.now(),name,qty,unit,unit_cost:cost,margin_pct:mg,
    total_cost:roundMoney(cost*qty),total_sell:roundMoney(sell*qty)});
  showForm=false; draw();
}

function removePart(id){parts=parts.filter(p=>p.id!==id);draw();}

function renderPartList(){
  const el=document.getElementById('partList'); if(!el)return;
  if(!parts.length){el.innerHTML='<div style="font-size:12px;color:var(--txt2);text-align:center;padding:6px 0 10px;">Nenhuma peça adicionada</div>';return;}
  el.innerHTML=parts.map(p=>`
    <div class="part-item">
      <div>
        <div style="font-size:13px;font-weight:600;">${p.name}</div>
        <div style="font-size:11px;color:var(--txt2);">${p.qty} ${p.unit} · custo ${fmt(p.total_cost)} · venda ${fmt(p.total_sell)}</div>
      </div>
      <button class="part-del" onclick="removePart(${p.id})">✕</button>
    </div>`).join('');
}

function buildCalcData(){
  const cfg=financeConfig||{};
  return {
    cfg, parts:parts.map(p=>({qty:p.qty,unit_cost:p.unit_cost,margin_pct:p.margin_pct})),
    gas:{has:hasGas,kg:parseFloat(document.getElementById('gasKg')?.value)||0,cost_kg:parseFloat(document.getElementById('gasCostKg')?.value)||0},
    nitrogen:{has:hasN2,m3:parseFloat(document.getElementById('n2M3')?.value)||0,cost:parseFloat(document.getElementById('n2Cost')?.value)||0},
    labor_hours:parseFloat(document.getElementById('qLh')?.value)||0,
    has_urgency:hasUrgency, has_visit:hasVisit,
    discount_pct:parseFloat(document.getElementById('discPct')?.value)||0,
    discount_val:parseFloat(document.getElementById('discVal')?.value)||0,
  };
}

function updateFooter(){
  const r=calcCorrective(buildCalcData());
  const el=document.getElementById('footerCard'); if(!el)return;
  el.innerHTML=`
    ${r.visit>0?`<div class="frow"><span class="frow-lbl">Taxa de visita</span><span class="frow-val">${fmt(r.visit)}</span></div>`:''}
    <div class="frow"><span class="frow-lbl">Custo peças</span><span class="frow-val">${fmt(r.partsCost)}</span></div>
    <div class="frow"><span class="frow-lbl">Peças c/ margem</span><span class="frow-val">${fmt(r.partsSell)}</span></div>
    ${r.gasSell>0?`<div class="frow"><span class="frow-lbl">Gás c/ margem</span><span class="frow-val">${fmt(r.gasSell)}</span></div>`:''}
    ${r.n2Sell>0?`<div class="frow"><span class="frow-lbl">Nitrogênio c/ margem</span><span class="frow-val">${fmt(r.n2Sell)}</span></div>`:''}
    <div class="frow"><span class="frow-lbl">Hora técnica</span><span class="frow-val">${fmt(r.labor)}</span></div>
    ${r.urgValue>0?`<div class="frow"><span class="frow-lbl">Adicional urgência</span><span class="frow-val" style="color:var(--warn);">${fmt(r.urgValue)}</span></div>`:''}
    <div class="frow"><span class="frow-lbl">Desconto</span><span class="frow-val" style="color:var(--err);">— ${fmt(r.disc)}</span></div>
    <div class="frow"><span class="frow-lbl">Total de custos</span><span class="frow-val">${fmt(r.cost)}</span></div>
    <div class="f-total-row">
      <span class="f-total-lbl">Total para o cliente</span>
      <span class="f-total-val">${fmt(r.final)}</span>
    </div>
    <div class="frow"><span class="frow-lbl">Lucro estimado</span>
      <span class="frow-val" style="color:${r.profit>=0?'var(--ok)':'var(--err)'};">${fmt(r.profit)} (${r.margin_pct}%)</span>
    </div>`;
}

function syncDisc(src){
  const r=calcCorrective(buildCalcData());
  if(src==='pct'){const pct=parseFloat(document.getElementById('discPct')?.value)||0;const el=document.getElementById('discVal');if(el)el.value=(r.subtotal*pct/100).toFixed(2);}
  else{const dv=parseFloat(document.getElementById('discVal')?.value)||0;const el=document.getElementById('discPct');if(el)el.value=r.subtotal>0?(dv/r.subtotal*100).toFixed(1):'0';}
  updateFooter();
}

async function doSave(){
  const desc=val('qDesc'); clearErr('qErr');
  if(!desc){showErr('qErr','Preencha a descrição');return;}
  setBtnLoading('savebtn',true,'Salvar Orçamento');
  const d=buildCalcData();
  const r=calcCorrective(d);
  const notes=val('qNotes');
  const year=new Date().getFullYear();
  const{data:lq}=await sb.from('quotes').select('sequence').eq('owner_id',currentUser.id).eq('year',year).order('sequence',{ascending:false}).limit(1).single();
  const seq=Math.max((lq?.sequence||0)+1,100);
  const{data:q,error:qe}=await sb.from('quotes').insert([{owner_id:currentUser.id,customer_id:parseInt(custId),year,sequence:seq,version:1,status:'draft',discount:r.disc,total_cost:r.cost,total_price:r.final,estimated_profit:r.profit,notes,params_snapshot:{...financeConfig,has_urgency:hasUrgency,has_visit:hasVisit},created_by_id:currentUser.id}]).select('id').single();
  if(qe){showErr('qErr','Erro: '+qe.message);setBtnLoading('savebtn',false,'Salvar Orçamento');return;}
  await sb.from('quote_corrective_items').insert([{quote_id:q.id,owner_id:currentUser.id,has_gas:hasGas,gas_type:hasGas?document.getElementById('gasType')?.value:null,gas_kg:d.gas.kg,gas_cost_kg:d.gas.cost_kg,has_nitrogen:hasN2,nitrogen_m3:d.nitrogen.m3,nitrogen_cost:d.nitrogen.cost}]);
  if(parts.length){await sb.from('quote_installation_items').insert(parts.map(p=>({quote_id:q.id,owner_id:currentUser.id,name:p.name,quantity:p.qty,unit:p.unit,unit_cost:p.unit_cost,margin_pct:p.margin_pct})));}
  await sb.from('quote_items').insert([{owner_id:currentUser.id,quote_id:q.id,service_type:'corrective',description:desc,difficulty:'medium',labor_hours:d.labor_hours,parts_cost:r.partsCost,gas_cost:r.gasCost,created_by_id:currentUser.id}]);
  toast('Orçamento salvo!','ok');
  setTimeout(()=>nav('orcamento.html?id='+q.id),800);
}
</script>
</body>
</html>

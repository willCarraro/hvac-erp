<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>ARCLASS — Orçamentos</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.filter-scroll { display:flex; gap:8px; padding:10px 14px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.filter-scroll::-webkit-scrollbar { display:none; }
.filter-chip { flex-shrink:0; padding:6px 14px; border-radius:20px; border:1.5px solid var(--bdr); background:var(--bg2); color:var(--txt2); font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all .2s; }
.filter-chip.on { border-color:var(--acc); background:rgba(0,191,255,.12); color:var(--acc); }
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let allQuotes  = [];
let activeFilter = 'all';

(async () => {
  const ok = await requireAuth();
  if (!ok) return;

  document.getElementById('app').innerHTML = `
  <div class="page">
    <div class="hdr">
      <h1>📋 Orçamentos</h1>
    </div>

    <div class="filter-scroll">
      <div class="filter-chip on" id="f-all"      onclick="setFilter('all')">Todos</div>
      <div class="filter-chip"    id="f-draft"    onclick="setFilter('draft')">Rascunho</div>
      <div class="filter-chip"    id="f-sent"     onclick="setFilter('sent')">Enviado</div>
      <div class="filter-chip"    id="f-approved" onclick="setFilter('approved')">Aprovado</div>
      <div class="filter-chip"    id="f-scheduled"onclick="setFilter('scheduled')">Agendado</div>
      <div class="filter-chip"    id="f-finished" onclick="setFilter('finished')">Concluído</div>
      <div class="filter-chip"    id="f-rejected" onclick="setFilter('rejected')">Recusado</div>
    </div>

    <div class="sec-hdr">
      <div class="sec-title">Lista</div>
      <span id="qCount" style="font-size:12px;color:var(--txt2);"></span>
    </div>
    <div id="qList"><div class="loading" style="min-height:200px;"><div class="spin"></div></div></div>

    <button class="fab" onclick="nav('orcamento-novo.html')">+</button>
  </div>
  ${renderNav('orcamentos')}`;

  await loadQuotes();
})();

async function loadQuotes() {
  const { data, error } = await sb.from('quotes')
    .select('id, sequence, year, version, status, total_price, created_at, customers(name)')
    .order('created_at', { ascending: false })
    .limit(200);

  if (error) { toast('Erro ao carregar orçamentos', 'err'); return; }
  allQuotes = data || [];
  renderList();
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(el => el.classList.remove('on'));
  document.getElementById('f-' + f)?.classList.add('on');
  renderList();
}

function renderList() {
  const list = activeFilter === 'all' ? allQuotes : allQuotes.filter(q => q.status === activeFilter);
  const el = document.getElementById('qList');
  const cnt = document.getElementById('qCount');
  if (cnt) cnt.textContent = list.length + (list.length === 1 ? ' orçamento' : ' orçamentos');

  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="eico">📋</div><h3>Nenhum orçamento</h3><p>Toque em + para criar um novo orçamento</p></div>`;
    return;
  }

  el.innerHTML = list.map(q => `
    <div class="li" onclick="nav('orcamento.html?id=${q.id}')">
      <div class="av" style="font-size:11px;">#${q.sequence}<br><span style="font-size:9px;opacity:.7;">${q.year}</span></div>
      <div class="li-info">
        <div class="li-name">${q.customers?.name || '—'}</div>
        <div class="li-sub">${fmt(q.total_price)} · ${fdate(q.created_at)}${q.version > 1 ? ' · v' + q.version : ''}</div>
      </div>
      <span class="${sBadgeClass(q.status)}">${sLabel(q.status)}</span>
    </div>`).join('');
}
</script>
</body>
</html>

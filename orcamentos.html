<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Orçamentos</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.filter-scroll{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.filter-scroll::-webkit-scrollbar{display:none;}
.fchip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.fchip.on{border-color:var(--acc);background:rgba(0,191,255,.12);color:var(--acc);}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
let allQ=[], activeF='active';

(async()=>{
  const ok=await requireAuth();if(!ok)return;
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr"><h1>📋 Orçamentos</h1></div>
    <div class="filter-scroll">
      ${[
        {id:'active',l:'Ativos'},
        {id:'draft',l:'Rascunho'},
        {id:'sent',l:'Enviado'},
        {id:'approved',l:'Aprovado'},
        {id:'scheduled',l:'Agendado'},
        {id:'rejected',l:'Reprovado'},
      ].map(f=>`<div class="fchip ${f.id==='active'?'on':''}" id="f-${f.id}" onclick="setF('${f.id}')">${f.l}</div>`).join('')}
    </div>
    <div class="sec-hdr"><div class="sec-title">Lista</div><span id="qCount" style="font-size:12px;color:var(--txt2);"></span></div>
    <div id="qList"><div class="loading" style="min-height:200px;"><div class="spin"></div></div></div>
    <button class="fab" onclick="nav('orcamento-novo.html')">+</button>
  </div>
  ${renderNav('orcamentos')}`;

  // Carregar orçamentos ativos (excluindo deletados, concluídos e arquivados)
  const{data}=await sb.from('quotes')
    .select('id,sequence,year,version,status,total_price,created_at,is_deleted,customers(name)')
    .eq('owner_id',currentUser.id)
    .neq('is_deleted',true) // excluir deletados
    .not('status','eq','finished') // excluir concluídos
    .order('created_at',{ascending:false}).limit(200);
  allQ=data||[]; renderList();
})();

// Filtros ativos = qualquer status exceto finished e deleted
function setF(f){
  activeF=f;
  document.querySelectorAll('.fchip').forEach(e=>e.classList.remove('on'));
  document.getElementById('f-'+f)?.classList.add('on');
  renderList();
}

function renderList(){
  const ACTIVE_STATUSES=['draft','pending','to_send','sent','approved','scheduled','rejected'];
  let list;
  if(activeF==='active') list=allQ.filter(q=>ACTIVE_STATUSES.includes(q.status));
  else list=allQ.filter(q=>q.status===activeF);

  const el=document.getElementById('qList'),cnt=document.getElementById('qCount');
  if(cnt)cnt.textContent=list.length+' orçamento(s)';
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="eico">📋</div><h3>Nenhum orçamento</h3><p>Toque em + para criar</p></div>`;return;
  }
  el.innerHTML=list.map(q=>`
    <div class="li" onclick="nav('orcamento.html?id=${q.id}')">
      <div class="av" style="font-size:11px;">#${q.sequence}<br><span style="font-size:9px;opacity:.7;">${q.year}</span></div>
      <div class="li-info">
        <div class="li-name">${q.customers?.name||'—'}</div>
        <div class="li-sub">${fmt(q.total_price)} · ${fdate(q.created_at)}${q.version>1?' · v'+q.version:''}</div>
      </div>
      <span class="${sBadgeClass(q.status)}">${{draft:'Rascunho',pending:'Pendente',to_send:'A Enviar',sent:'Enviado',approved:'Aprovado',scheduled:'Agendado',rejected:'Reprovado'}[q.status]||q.status}</span>
    </div>`).join('');
}
</script>
</body>
</html>

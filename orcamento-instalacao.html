<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Instalação</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.mat-form{background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:12px;}
.mat-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end;margin-bottom:8px;}
.mat-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.add-btn{background:rgba(0,191,255,.12);border:1.5px dashed var(--acc);border-radius:10px;padding:12px;width:100%;color:var(--acc);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.add-btn:active{background:rgba(0,191,255,.2);}

.mat-list{margin-bottom:12px;}
.mat-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.mat-item-info{flex:1;}
.mat-item-name{font-size:13px;font-weight:600;}
.mat-item-sub{font-size:11px;color:var(--txt2);margin-top:2px;}
.mat-item-prices{text-align:right;flex-shrink:0;}
.mat-cost{font-size:11px;color:var(--txt2);}
.mat-price{font-size:13px;font-weight:700;color:var(--acc);}
.mat-del{background:none;border:none;color:var(--err);font-size:16px;cursor:pointer;padding:0 2px;}

.footer-box{background:var(--bg3);border-radius:12px;padding:14px;margin-top:4px;}
.f-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid var(--bdr);}
.f-row:last-child{border-bottom:none;}
.f-lbl{color:var(--txt2);}
.f-val{font-weight:600;}
.f-total{font-size:18px;font-weight:800;color:var(--acc);}
.f-profit{font-size:13px;font-weight:700;}

.disc-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/calc.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const custId     = params.get('customer_id');
const UNITS      = ['metro','unidade','conjunto','kg','litro','par','rolo','m²','hora'];

let customer  = null;
let materials = []; // lista de materiais adicionados
let showForm  = false;

(async()=>{
  const ok = await requireAuth(); if(!ok) return;
  if(!custId){nav('orcamento-novo.html');return;}
  const {data} = await sb.from('customers').select('id,name,phone').eq('id',custId).single();
  customer = data;
  draw();
})();

function draw(){
  const c = financeConfig||{};
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="history.back()">←</button>
      <h1>🔧 Instalação</h1>
    </div>
    <div class="fp">

      <!-- Cliente -->
      <div style="background:rgba(0,191,255,.08);border:1.5px solid var(--acc);border-radius:10px;padding:10px 14px;margin-bottom:16px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;">Cliente</div>
        <div style="font-size:15px;font-weight:700;margin-top:2px;">${customer?.name||'—'}</div>
      </div>

      <!-- Descrição -->
      <div class="fg">
        <label class="fl">Descrição do serviço *</label>
        <input class="fi" id="qDesc" placeholder="Ex: Instalação Split 12.000 BTU — Sala principal">
      </div>

      <!-- Materiais -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px;">
        <div style="font-size:14px;font-weight:700;">📦 Materiais</div>
        <div style="font-size:11px;color:var(--txt2);">Margem: ${c.material_margin||30}%</div>
      </div>

      <div id="matList"></div>

      ${showForm ? addMatForm() : `<button class="add-btn" onclick="showForm=true;draw()">+ Adicionar material</button>`}

      <!-- Mão de obra -->
      <div class="fsec">Mão de obra</div>
      <div class="fg">
        <label class="fl">Horas trabalhadas</label>
        <input class="fi" id="qLh" type="number" value="0" step="0.5" min="0" inputmode="decimal" oninput="updateFooter()">
      </div>
      <div style="font-size:11px;color:var(--txt2);margin-top:4px;">Taxa hora: ${fmt(c.hourly_rate||150)}/h</div>

      <!-- Desconto -->
      <div class="fsec">Desconto</div>
      <div class="disc-row">
        <div class="fg">
          <label class="fl">Em % </label>
          <input class="fi" id="discPct" type="number" value="0" step="1" min="0" max="100" inputmode="decimal" oninput="syncDisc('pct')">
        </div>
        <div class="fg">
          <label class="fl">Em R$</label>
          <input class="fi" id="discVal" type="number" value="0" step="10" min="0" inputmode="decimal" oninput="syncDisc('val')">
        </div>
      </div>

      <!-- Observações -->
      <div class="fg" style="margin-top:10px;">
        <label class="fl">Observações para o cliente</label>
        <textarea class="fta" id="qNotes" placeholder="Prazo, garantia, condições especiais..."></textarea>
      </div>

      <!-- Footer financeiro -->
      <div class="fsec">Resumo</div>
      <div class="footer-box" id="footerBox"></div>

      <div id="qErr" style="margin-top:12px;"></div>
      <button class="btn bp" id="savebtn" style="margin-top:14px;" onclick="doSave()">✓ Salvar Orçamento</button>
    </div>
  </div>`;

  renderMatList();
  updateFooter();
}

function addMatForm(){return `
  <div class="mat-form">
    <div class="fg">
      <label class="fl">Nome do material *</label>
      <input class="fi" id="mName" placeholder="Ex: Cobre ¼ × 3/8" autocomplete="off">
    </div>
    <div class="mat-row2" style="margin-top:8px;">
      <div class="fg"><label class="fl">Quantidade</label>
        <input class="fi" id="mQty" type="number" value="1" step="0.5" min="0" inputmode="decimal"></div>
      <div class="fg"><label class="fl">Unidade</label>
        <select class="fs" id="mUnit">
          ${UNITS.map(u=>`<option value="${u}">${u}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="fg" style="margin-top:8px;">
      <label class="fl">Valor de custo (sem margem) R$</label>
      <input class="fi" id="mCost" type="number" value="0" step="1" min="0" inputmode="decimal">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">
      <button class="btn bs" onclick="showForm=false;draw()">Cancelar</button>
      <button class="btn bp" onclick="addMat()">+ Adicionar</button>
    </div>
  </div>`;}

function addMat(){
  const name = document.getElementById('mName')?.value?.trim();
  const qty  = parseFloat(document.getElementById('mQty')?.value)||1;
  const unit = document.getElementById('mUnit')?.value||'unidade';
  const cost = parseFloat(document.getElementById('mCost')?.value)||0;
  if(!name){toast('Informe o nome do material','err');return;}
  const margin = financeConfig?.material_margin||30;
  const price  = cost*(1+margin/100);
  materials.push({id:Date.now(), name, qty, unit, cost, price, total_cost:cost*qty, total_price:price*qty});
  showForm=false; draw();
}

function removeMat(id){
  materials = materials.filter(m=>m.id!==id); draw();
}

function renderMatList(){
  const el = document.getElementById('matList');
  if(!el) return;
  if(!materials.length){el.innerHTML='<div style="font-size:12px;color:var(--txt2);text-align:center;padding:8px 0 12px;">Nenhum material adicionado</div>';return;}
  el.innerHTML=materials.map(m=>`
    <div class="mat-item">
      <div class="mat-item-info">
        <div class="mat-item-name">${m.name}</div>
        <div class="mat-item-sub">${m.qty} ${m.unit} · custo ${fmt(m.total_cost)}</div>
      </div>
      <div class="mat-item-prices">
        <div class="mat-cost">${fmt(m.total_cost)}</div>
        <div class="mat-price">${fmt(m.total_price)}</div>
      </div>
      <button class="mat-del" onclick="removeMat(${m.id})">✕</button>
    </div>`).join('');
}

function updateFooter(){
  const c   = financeConfig||{};
  const lh  = parseFloat(document.getElementById('qLh')?.value)||0;
  const labor = lh*(c.hourly_rate||150);
  const matCost  = materials.reduce((s,m)=>s+m.total_cost,0);
  const matPrice = materials.reduce((s,m)=>s+m.total_price,0);
  const subTotal = labor + matPrice;
  const disc     = parseFloat(document.getElementById('discVal')?.value)||0;
  const final    = Math.max(0, subTotal - disc);
  const totalCost= labor + matCost;
  const profit   = final - totalCost;

  const el = document.getElementById('footerBox');
  if(!el) return;
  el.innerHTML=`
    <div class="f-row"><span class="f-lbl">Custo total material</span><span class="f-val">${fmt(matCost)}</span></div>
    <div class="f-row"><span class="f-lbl">Material c/ margem</span><span class="f-val">${fmt(matPrice)}</span></div>
    <div class="f-row"><span class="f-lbl">Mão de obra</span><span class="f-val">${fmt(labor)}</span></div>
    <div class="f-row"><span class="f-lbl">Desconto</span><span class="f-val" style="color:var(--err);">— ${fmt(disc)}</span></div>
    <div class="f-row"><span style="font-weight:700;">Total para o cliente</span><span class="f-total">${fmt(final)}</span></div>
    <div class="f-row"><span class="f-lbl">Lucro estimado</span>
      <span class="f-profit" style="color:${profit>=0?'var(--ok)':'var(--err)'};">${fmt(profit)}</span>
    </div>`;
}

function syncDisc(src){
  const c   = financeConfig||{};
  const lh  = parseFloat(document.getElementById('qLh')?.value)||0;
  const matPrice = materials.reduce((s,m)=>s+m.total_price,0);
  const sub = lh*(c.hourly_rate||150) + matPrice;
  if(src==='pct'){
    const pct = parseFloat(document.getElementById('discPct')?.value)||0;
    const el  = document.getElementById('discVal'); if(el) el.value=(sub*pct/100).toFixed(2);
  } else {
    const dv  = parseFloat(document.getElementById('discVal')?.value)||0;
    const el  = document.getElementById('discPct'); if(el) el.value=sub>0?(dv/sub*100).toFixed(1):'0';
  }
  updateFooter();
}

async function doSave(){
  const desc = val('qDesc');
  clearErr('qErr');
  if(!desc){showErr('qErr','Preencha a descrição do serviço');return;}
  if(!financeConfig){showErr('qErr','Configuração financeira não carregada');return;}
  setBtnLoading('savebtn',true,'Salvar Orçamento');

  const c      = financeConfig;
  const lh     = parseFloat(document.getElementById('qLh')?.value)||0;
  const disc   = parseFloat(document.getElementById('discVal')?.value)||0;
  const notes  = val('qNotes');
  const labor  = lh*(c.hourly_rate||150);
  const matCost  = materials.reduce((s,m)=>s+m.total_cost,0);
  const matPrice = materials.reduce((s,m)=>s+m.total_price,0);
  const subTotal = labor + matPrice;
  const final    = Math.max(0,subTotal-disc);
  const totalCost= labor+matCost;
  const profit   = final-totalCost;

  const year = new Date().getFullYear();
  const {data:lq} = await sb.from('quotes').select('sequence').eq('owner_id',currentUser.id).eq('year',year).order('sequence',{ascending:false}).limit(1).single();
  const seq = Math.max((lq?.sequence||0)+1, 100);

  const {data:q,error:qe} = await sb.from('quotes').insert([{
    owner_id:currentUser.id, customer_id:parseInt(custId),
    year, sequence:seq, version:1, status:'draft',
    discount:disc, total_cost:totalCost, total_price:final,
    estimated_profit:profit, notes, params_snapshot:c,
    created_by_id:currentUser.id,
  }]).select('id').single();

  if(qe){showErr('qErr','Erro: '+qe.message);setBtnLoading('savebtn',false,'Salvar Orçamento');return;}

  // Salvar itens de instalação
  if(materials.length){
    await sb.from('quote_installation_items').insert(
      materials.map(m=>({
        quote_id:q.id, owner_id:currentUser.id,
        name:m.name, quantity:m.qty, unit:m.unit,
        unit_cost:m.cost, margin_pct:c.material_margin||30,
      }))
    );
  }

  // Salvar item de MO no quote_items
  await sb.from('quote_items').insert([{
    owner_id:currentUser.id, quote_id:q.id,
    service_type:'installation', description:desc,
    difficulty:'medium', labor_hours:lh,
    material_cost:matCost, created_by_id:currentUser.id,
  }]);

  toast('Orçamento salvo!','ok');
  setTimeout(()=>nav('orcamento.html?id='+q.id),800);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Instalação</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.add-btn{background:rgba(0,191,255,.1);border:1.5px dashed var(--acc);border-radius:10px;padding:12px;width:100%;color:var(--acc);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.mat-form,.extra-form{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px;}
.list-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:6px;}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;}
.item-del{background:none;border:none;color:var(--err);font-size:16px;cursor:pointer;padding:0 2px;}
.mat-prices{display:flex;gap:14px;margin-top:5px;font-size:12px;}
.price-cost{color:var(--txt2);}
.price-sell{color:var(--acc);font-weight:700;}
.footer-card{background:var(--bg3);border-radius:12px;padding:14px;}
.frow{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--bdr);}
.frow:last-child{border-bottom:none;}
.frow-lbl{color:var(--txt2);}
.f-total-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0 6px;border-top:2px solid var(--bdr);margin-top:4px;}
.f-total-val{font-size:22px;font-weight:800;color:var(--acc);}
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.units-scroll{display:flex;gap:6px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;}
.units-scroll::-webkit-scrollbar{display:none;}
.unit-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--bg2);color:var(--txt2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.unit-chip.sel{border-color:var(--acc);background:rgba(0,191,255,.12);color:var(--acc);}
.edit-notice{background:rgba(243,156,18,.1);border:1px solid var(--warn);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--warn);margin-bottom:12px;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script><script src="js/calc.js"></script>
<script>
const params  = new URLSearchParams(window.location.search);
const custId  = params.get('customer_id');
const editId  = params.get('edit');
const UNITS   = ['metro','unidade','conjunto','kg','litro','par','rolo','m²','hora'];

let customer  = null, materials = [], extras = [];
let showMatForm = false, showExtraForm = false, selUnit = 'unidade';
let existingQuote = null;

(async()=>{
  const ok = await requireAuth(); if(!ok) return;

  if(editId){
    const [{data:q},{data:instItems},{data:exItems}] = await Promise.all([
      sb.from('quotes').select('*,customers(id,name)').eq('id', editId).single(),
      sb.from('quote_installation_items').select('*').eq('quote_id', editId),
      sb.from('quote_extras').select('*').eq('quote_id', editId),
    ]);
    if(!q){ toast('Orçamento não encontrado','err'); history.back(); return; }
    existingQuote = q;
    customer = q.customers;
    materials = (instItems||[]).map(i=>({
      id:i.id, name:i.name, qty:i.quantity, unit:i.unit||'unidade',
      unit_cost:i.unit_cost, margin_pct:i.margin_pct||30,
      total_cost:R(i.unit_cost*i.quantity),
      total_sell:R(i.unit_cost*(1+(i.margin_pct||30)/100)*i.quantity),
    }));
    extras = (exItems||[]).map(e=>({id:e.id, description:e.description, value:e.value}));
  } else {
    if(!custId){ nav('orcamento-novo.html'); return; }
    const {data} = await sb.from('customers').select('id,name').eq('id', custId).single();
    if(!data){ toast('Cliente não encontrado','err'); nav('orcamento-novo.html'); return; }
    customer = data;
  }
  draw();
})();

const R = v => Math.round((parseFloat(v)||0)*100)/100;
const D = (sub,pct,fix) => fix>0 ? R(fix) : R(sub*(pct||0)/100);

function draw(){
  const cfg = financeConfig||{};
  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr">
      <button class="back-btn" onclick="${editId?`nav('orcamento.html?id=${editId}')`:history.back()}">←</button>
      <h1>${editId?'✏️ Editar — Instalação':'🔧 Instalação'}</h1>
    </div>
    <div class="fp">
      ${editId?`<div class="edit-notice">✏️ Editando orçamento #${existingQuote?.sequence}/${existingQuote?.year} — o mesmo orçamento será atualizado</div>`:''}

      <div style="background:rgba(0,191,255,.08);border:1.5px solid var(--acc);border-radius:10px;padding:10px 14px;margin-bottom:14px;">
        <div style="font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.6px;">Cliente</div>
        <div style="font-size:15px;font-weight:700;margin-top:2px;">${customer?.name||'—'}</div>
      </div>

      <div class="fg"><label class="fl">Descrição do serviço *</label>
        <input class="fi" id="qDesc" value="${existingQuote?.notes||''}" placeholder="Ex: Instalação Split 12.000 BTU — Sala principal"></div>

      <!-- MATERIAIS -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px;">
        <div style="font-size:14px;font-weight:700;">📦 Materiais</div>
        <div style="font-size:11px;color:var(--txt2);">Margem: ${cfg.material_margin||30}%</div>
      </div>
      <div id="matList"></div>
      ${showMatForm ? matFormHtml() : `<button class="add-btn" onclick="showMatForm=true;draw()">+ Adicionar material</button>`}

      <!-- EXTRAS -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px;">
        <div style="font-size:14px;font-weight:700;">➕ Extras</div>
        <div style="font-size:11px;color:var(--txt2);">Andaime, deslocamento, suporte...</div>
      </div>
      <div id="extraList"></div>
      ${showExtraForm ? extraFormHtml() : `<button class="add-btn" onclick="showExtraForm=true;draw()">+ Adicionar extra</button>`}

      <!-- MÃO DE OBRA -->
      <div class="fsec">Mão de obra</div>
      <div style="font-size:12px;color:var(--txt2);margin-bottom:8px;">Valor cobrado ao cliente (entra como receita/lucro)</div>
      <div class="fg"><label class="fl">Valor da mão de obra R$</label>
        <input class="fi" id="qLabor" type="number" value="${existingQuote?.params_snapshot?.labor_value||0}" step="10" min="0" inputmode="decimal" oninput="updateFooter()"></div>
      <div style="font-size:11px;color:var(--txt2);margin-top:4px;">Ref: ${fmt(cfg.hourly_rate||150)}/h</div>

      <!-- DESCONTO -->
      <div class="fsec">Desconto</div>
      <div class="disc-grid">
        <div class="fg"><label class="fl">Em %</label>
          <input class="fi" id="discPct" type="number" value="${existingQuote?.params_snapshot?.discount_pct||0}" step="1" min="0" max="100" inputmode="decimal" oninput="syncDisc('pct')"></div>
        <div class="fg"><label class="fl">Em R$</label>
          <input class="fi" id="discVal" type="number" value="${existingQuote?.discount||0}" step="10" min="0" inputmode="decimal" oninput="syncDisc('val')"></div>
      </div>

      <div class="fg" style="margin-top:10px;"><label class="fl">Observações para o cliente</label>
        <textarea class="fta" id="qNotes" placeholder="Prazo, garantia, condições...">${existingQuote?.notes||''}</textarea></div>

      <div class="fsec">Resumo financeiro</div>
      <div class="footer-card" id="footerCard"></div>
      <div id="qErr" style="margin-top:12px;"></div>
      <button class="btn bp" id="savebtn" style="margin-top:14px;" onclick="doSave()">
        ✓ ${editId ? 'Salvar alterações' : 'Salvar Orçamento'}
      </button>
    </div>
  </div>`;
  renderMatList(); renderExtraList(); updateFooter();
}

function matFormHtml(){ return `
  <div class="mat-form">
    <div class="fg"><label class="fl">Nome do material *</label>
      <input class="fi" id="mName" placeholder="Ex: Cobre ¼ × 3/8" autocomplete="off"></div>
    <div class="fr" style="margin-top:8px;">
      <div class="fg"><label class="fl">Quantidade</label>
        <input class="fi" id="mQty" type="number" value="1" step="0.5" min="0" inputmode="decimal"></div>
      <div class="fg"><label class="fl">Custo unitário R$</label>
        <input class="fi" id="mCost" type="number" value="0" step="1" min="0" inputmode="decimal"></div>
    </div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Unidade</label>
      <div class="units-scroll">
        ${UNITS.map(u=>`<div class="unit-chip ${u===selUnit?'sel':''}" onclick="selUnit='${u}';rerenderUnits()">${u}</div>`).join('')}
      </div>
    </div>
    <div style="font-size:11px;color:var(--txt2);margin-top:4px;">Margem: <strong style="color:var(--acc);">${financeConfig?.material_margin||30}%</strong></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
      <button class="btn bs" onclick="showMatForm=false;selUnit='unidade';draw()">Cancelar</button>
      <button class="btn bp" onclick="addMat()">+ Adicionar</button>
    </div>
  </div>`; }

function extraFormHtml(){ return `
  <div class="extra-form">
    <div class="fg"><label class="fl">Descrição *</label>
      <input class="fi" id="eName" placeholder="Ex: Andaime, Deslocamento extra, Suporte especial"></div>
    <div class="fg" style="margin-top:8px;"><label class="fl">Valor R$</label>
      <input class="fi" id="eValue" type="number" value="0" step="10" min="0" inputmode="decimal"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
      <button class="btn bs" onclick="showExtraForm=false;draw()">Cancelar</button>
      <button class="btn bp" onclick="addExtra()">+ Adicionar</button>
    </div>
  </div>`; }

function rerenderUnits(){
  const el=document.querySelector('.units-scroll'); if(!el) return;
  el.innerHTML=UNITS.map(u=>`<div class="unit-chip ${u===selUnit?'sel':''}" onclick="selUnit='${u}';rerenderUnits()">${u}</div>`).join('');
}

function addMat(){
  const name=document.getElementById('mName')?.value?.trim();
  const qty=parseFloat(document.getElementById('mQty')?.value)||1;
  const cost=parseFloat(document.getElementById('mCost')?.value)||0;
  if(!name){toast('Informe o nome','err');return;}
  const mg=financeConfig?.material_margin||30;
  materials.push({id:Date.now(),name,qty,unit:selUnit,unit_cost:cost,margin_pct:mg,
    total_cost:R(cost*qty), total_sell:R(cost*(1+mg/100)*qty)});
  showMatForm=false; selUnit='unidade'; draw();
}

function addExtra(){
  const name=document.getElementById('eName')?.value?.trim();
  const value=parseFloat(document.getElementById('eValue')?.value)||0;
  if(!name){toast('Informe a descrição','err');return;}
  extras.push({id:Date.now(),description:name,value});
  showExtraForm=false; draw();
}

function removeMat(id){materials=materials.filter(m=>m.id!==id);draw();}
function removeExtra(id){extras=extras.filter(e=>e.id!==id);draw();}

function renderMatList(){
  const el=document.getElementById('matList'); if(!el) return;
  if(!materials.length){el.innerHTML='<div style="font-size:12px;color:var(--txt2);text-align:center;padding:6px 0 10px;">Nenhum material adicionado</div>';return;}
  el.innerHTML=materials.map(m=>`
    <div class="list-item">
      <div class="item-top"><span style="font-size:13px;font-weight:600;flex:1;">${m.name}</span><button class="item-del" onclick="removeMat(${m.id})">✕</button></div>
      <div style="font-size:11px;color:var(--txt2);margin-top:3px;">${m.qty} ${m.unit}</div>
      <div class="mat-prices"><span class="price-cost">Custo: ${fmt(m.total_cost)}</span><span class="price-sell">Venda: ${fmt(m.total_sell)}</span></div>
    </div>`).join('');
}

function renderExtraList(){
  const el=document.getElementById('extraList'); if(!el) return;
  if(!extras.length){el.innerHTML='<div style="font-size:12px;color:var(--txt2);text-align:center;padding:6px 0 10px;">Nenhum extra adicionado</div>';return;}
  el.innerHTML=extras.map(e=>`
    <div class="list-item">
      <div class="item-top"><span style="font-size:13px;font-weight:600;flex:1;">${e.description}</span><button class="item-del" onclick="removeExtra(${e.id})">✕</button></div>
      <div style="font-size:13px;color:var(--acc);font-weight:700;margin-top:4px;">${fmt(e.value)}</div>
    </div>`).join('');
}

function getCalc(){
  const labor=parseFloat(document.getElementById('qLabor')?.value)||0;
  const discPct=parseFloat(document.getElementById('discPct')?.value)||0;
  const discVal=parseFloat(document.getElementById('discVal')?.value)||0;
  const matSell=materials.reduce((s,m)=>s+m.total_sell,0);
  const extraTotal=extras.reduce((s,e)=>s+e.value,0);
  const subtotal=R(matSell+extraTotal+labor);
  const disc=D(subtotal,discPct,discVal);
  const final=R(Math.max(0,subtotal-disc));
  const cost=R(materials.reduce((s,m)=>s+m.total_cost,0));
  const profit=R(final-cost);
  return {labor,discPct,discVal,matSell,extraTotal,subtotal,disc,final,cost,profit};
}

function updateFooter(){
  const r=getCalc();
  const el=document.getElementById('footerCard'); if(!el) return;
  el.innerHTML=`
    <div class="frow"><span class="frow-lbl">Custo materiais</span><span>${fmt(r.cost)}</span></div>
    <div class="frow"><span class="frow-lbl">Materiais c/ margem</span><span style="color:var(--acc);">${fmt(r.matSell)}</span></div>
    ${r.extraTotal?`<div class="frow"><span class="frow-lbl">Extras</span><span>${fmt(r.extraTotal)}</span></div>`:''}
    <div class="frow"><span class="frow-lbl">Mão de obra</span><span>${fmt(r.labor)}</span></div>
    <div class="frow"><span class="frow-lbl">Desconto</span><span style="color:var(--err);">— ${fmt(r.disc)}</span></div>
    <div class="f-total-row"><span style="font-size:16px;font-weight:800;">Total para o cliente</span><span class="f-total-val">${fmt(r.final)}</span></div>
    <div class="frow"><span class="frow-lbl">Lucro estimado</span>
      <span style="font-weight:600;color:${r.profit>=0?'var(--ok)':'var(--err)'};">${fmt(r.profit)}</span></div>`;
}

function syncDisc(src){
  const r=getCalc();
  if(src==='pct'){const pct=parseFloat(document.getElementById('discPct')?.value)||0;const el=document.getElementById('discVal');if(el)el.value=(r.subtotal*pct/100).toFixed(2);}
  else{const dv=parseFloat(document.getElementById('discVal')?.value)||0;const el=document.getElementById('discPct');if(el)el.value=r.subtotal>0?(dv/r.subtotal*100).toFixed(1):'0';}
  updateFooter();
}

async function doSave(){
  const desc=val('qDesc'); clearErr('qErr');
  if(!desc){showErr('qErr','Preencha a descrição do serviço');return;}
  setBtnLoading('savebtn',true, editId?'Salvar alterações':'Salvar Orçamento');
  const r=getCalc();
  const notes=val('qNotes');

  if(editId){
    // UPDATE — mesmo orçamento
    const{error}=await sb.from('quotes').update({
      discount:r.disc, total_cost:r.cost, total_price:r.final,
      estimated_profit:r.profit, notes,
      params_snapshot:{...financeConfig,labor_value:r.labor,discount_pct:r.discPct},
      updated_at:new Date().toISOString(),
    }).eq('id', editId);
    if(error){showErr('qErr','Erro: '+error.message);setBtnLoading('savebtn',false,'Salvar alterações');return;}
    // Recriar itens
    await sb.from('quote_installation_items').delete().eq('quote_id', editId);
    await sb.from('quote_extras').delete().eq('quote_id', editId);
    if(materials.length) await sb.from('quote_installation_items').insert(materials.map(m=>({
      quote_id:parseInt(editId), owner_id:currentUser.id,
      name:m.name, quantity:m.qty, unit:m.unit, unit_cost:m.unit_cost, margin_pct:m.margin_pct,
    })));
    if(extras.length) await sb.from('quote_extras').insert(extras.map(e=>({
      quote_id:parseInt(editId), owner_id:currentUser.id, description:e.description, value:e.value,
    })));
    toast('Orçamento atualizado!','ok');
    setTimeout(()=>nav('orcamento.html?id='+editId),800);
  } else {
    // INSERT NOVO
    const year=new Date().getFullYear();
    const seq=await nextQuoteSequence(sb,currentUser.id,year);
    const{data:q,error:qe}=await sb.from('quotes').insert([{
      owner_id:currentUser.id, customer_id:parseInt(custId),
      year, sequence:seq, version:1, status:'draft',
      discount:r.disc, total_cost:r.cost, total_price:r.final,
      estimated_profit:r.profit, notes,
      params_snapshot:{...financeConfig,labor_value:r.labor,discount_pct:r.discPct},
      created_by_id:currentUser.id,
    }]).select('id').single();
    if(qe){showErr('qErr','Erro: '+qe.message);setBtnLoading('savebtn',false,'Salvar Orçamento');return;}
    if(materials.length) await sb.from('quote_installation_items').insert(materials.map(m=>({
      quote_id:q.id, owner_id:currentUser.id,
      name:m.name, quantity:m.qty, unit:m.unit, unit_cost:m.unit_cost, margin_pct:m.margin_pct,
    })));
    if(extras.length) await sb.from('quote_extras').insert(extras.map(e=>({
      quote_id:q.id, owner_id:currentUser.id, description:e.description, value:e.value,
    })));
    await sb.from('quote_items').insert([{
      owner_id:currentUser.id, quote_id:q.id,
      service_type:'installation', description:desc,
      difficulty:'medium', labor_hours:0, material_cost:r.cost,
      created_by_id:currentUser.id,
    }]);
    toast('Orçamento salvo!','ok');
    setTimeout(()=>nav('orcamento.html?id='+q.id),800);
  }
}
</script>
</body>
</html>

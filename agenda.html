<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Agenda</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;}
.cal-nav h3{font-size:15px;font-weight:700;}
.cal-nav button{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);padding:6px 14px;cursor:pointer;font-size:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 10px;}
.cal-head{text-align:center;font-size:10px;font-weight:700;color:var(--txt2);padding:5px 0;text-transform:uppercase;}
.cal-day{text-align:center;padding:6px 2px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;min-height:38px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;position:relative;}
.cal-day.today{background:rgba(0,191,255,.15);border:1.5px solid var(--acc);color:var(--acc);}
.cal-day.sel{background:var(--acc)!important;color:#0F1923!important;border:none;}
.cal-day.free{background:rgba(46,204,113,.12);color:var(--ok);}
.cal-day.partial{background:rgba(243,156,18,.12);color:var(--warn);}
.cal-day.full{background:rgba(231,76,60,.12);color:var(--err);}
.cal-day.holiday{position:relative;}
.cal-day.holiday::after{content:'';position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--warn);}
.cal-day.other{opacity:.25;}
.day-dot{width:5px;height:5px;border-radius:50%;background:currentColor;margin-top:1px;}
.legend{display:flex;gap:12px;padding:8px 14px;font-size:11px;color:var(--txt2);flex-wrap:wrap;}
.legend span{display:flex;align-items:center;gap:4px;}
.legend .dot{width:8px;height:8px;border-radius:50%;}

/* Modal de agendamento */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:430px;padding:16px 20px 32px;border-top:1px solid var(--bdr);}
.modal-handle{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:14px;}

.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.cat-btn{padding:10px 6px;border-radius:10px;border:2px solid var(--bdr);background:var(--bg3);color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;}
.cat-btn.sel{border-color:var(--acc);background:rgba(0,191,255,.1);color:var(--acc);}

.appt-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:8px;}
.appt-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.cat-visita{color:#9B59B6;}
.cat-orcamento{color:var(--warn);}
.cat-servico{color:var(--ok);}
.appt-time{font-size:12px;color:var(--acc);font-weight:700;}
.appt-name{font-size:14px;font-weight:600;margin-top:2px;}
.appt-actions{display:flex;gap:8px;margin-top:10px;}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// Feriados nacionais (MM-DD)
const HOLIDAYS={
  '01-01':'Ano Novo','04-21':'Tiradentes','05-01':'Dia do Trabalho',
  '09-07':'Independência','10-12':'N. Sra. Aparecida','11-02':'Finados',
  '11-15':'Proclamação','12-25':'Natal'
};

let currentDate=new Date(), selectedDate=null;
let appointments=[], pendingServices=[], modalOpen=false;
let modalCat='servico', modalApprovedId=null;

(async()=>{
  const ok=await requireAuth(); if(!ok)return;
  await loadData(); draw();
})();

async function loadData(){
  const y=currentDate.getFullYear(), m=currentDate.getMonth();
  const from=new Date(y,m,1).toISOString().split('T')[0];
  const to=new Date(y,m+1,0).toISOString().split('T')[0];
  const[{data:apps},{data:pend}]=await Promise.all([
    sb.from('appointments').select('*,quotes(sequence,customers(name))').eq('owner_id',currentUser.id).gte('scheduled_date',from).lte('scheduled_date',to).order('scheduled_date').order('scheduled_time'),
    sb.from('quotes').select('id,sequence,year,customers(name)').eq('owner_id',currentUser.id).eq('status','approved'),
  ]);
  appointments=apps||[]; pendingServices=pend||[];
}

function draw(){
  const y=currentDate.getFullYear(), m=currentDate.getMonth();
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];

  const apptByDay={};
  appointments.forEach(a=>{
    if(!apptByDay[a.scheduled_date])apptByDay[a.scheduled_date]=[];
    apptByDay[a.scheduled_date].push(a);
  });

  let days='';
  const prevDays=new Date(y,m,0).getDate();
  for(let i=firstDay-1;i>=0;i--) days+=`<div class="cal-day other">${prevDays-i}</div>`;

  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ap=apptByDay[ds]||[];
    const mmdd=`${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isHoliday=!!HOLIDAYS[mmdd];
    const isToday=ds===todayStr, isSel=selectedDate===ds;
    let cls='cal-day';
    if(isSel) cls+=' sel';
    else if(isToday) cls+=' today';
    else if(ap.length>=4) cls+=' full';
    else if(ap.length>=2) cls+=' partial';
    else if(ap.length>=1) cls+=' free';
    if(isHoliday&&!isSel) cls+=' holiday';
    days+=`<div class="${cls}" onclick="selectDay('${ds}')" title="${isHoliday?HOLIDAYS[mmdd]:''}">
      ${d}${ap.length?`<div class="day-dot"></div>`:''}
    </div>`;
  }
  const rem=(7-((firstDay+daysInMonth)%7))%7;
  for(let d=1;d<=rem;d++) days+=`<div class="cal-day other">${d}</div>`;

  const selAppts=selectedDate?(apptByDay[selectedDate]||[]):[];
  const catLabel={visita:'🚗 Visita técnica',orcamento:'📋 Orçamento',servico:'🔧 Serviço aprovado'};
  const catCls={visita:'cat-visita',orcamento:'cat-orcamento',servico:'cat-servico'};

  const daySection=selectedDate?`
    <div class="sec-hdr">
      <div class="sec-title">${new Date(selectedDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div>
      <button class="btn bp btn-sm" onclick="openModal()">+ Agendar</button>
    </div>
    <div style="padding:0 14px;">
      ${selAppts.length?selAppts.map(a=>{
        const name=a.quotes?.customers?.name||'—';
        const seq=a.quotes?.sequence?`#${a.quotes.sequence}`:'';
        return`<div class="appt-card">
          <div class="appt-cat ${catCls[a.category]||'cat-servico'}">${catLabel[a.category]||a.category}</div>
          <div class="appt-time">${a.scheduled_time?a.scheduled_time.slice(0,5):'Horário a definir'}</div>
          <div class="appt-name">${name} ${seq}</div>
          ${a.notes?`<div style="font-size:11px;color:var(--txt2);margin-top:4px;">${a.notes}</div>`:''}
          <div class="appt-actions">
            <button class="btn berr btn-sm" onclick="deleteAppt(${a.id})">🗑️ Excluir</button>
          </div>
        </div>`;
      }).join(''):`<div style="font-size:13px;color:var(--txt2);padding:8px 0;">Sem agendamentos neste dia.</div>`}
    </div>`:'';

  const pendSection=pendingServices.length?`
    <div class="sec-hdr" style="margin-top:4px;">
      <div class="sec-title">⏳ Serviços aprovados</div>
      <span style="font-size:12px;color:var(--warn);font-weight:700;">${pendingServices.length} aguardando</span>
    </div>
    <div style="padding:0 14px 14px;">
      ${pendingServices.map(q=>`
        <div style="background:rgba(243,156,18,.08);border:1px solid var(--warn);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;" onclick="nav('orcamento.html?id=${q.id}')">
          <div style="font-size:13px;font-weight:700;color:var(--warn);">🔧 Serviço #${q.sequence}/${q.year}</div>
          <div style="font-size:12px;color:var(--txt2);">${q.customers?.name||'—'} · Aprovado, aguardando agendamento</div>
        </div>`).join('')}
    </div>`:'';

  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr"><h1>📅 Agenda</h1></div>
    <div class="cal-nav">
      <button onclick="prevMonth()">←</button>
      <h3>${MONTHS[m]} ${y}</h3>
      <button onclick="nextMonth()">→</button>
    </div>
    <div class="cal-grid">
      ${DAYS.map(d=>`<div class="cal-head">${d}</div>`).join('')}
      ${days}
    </div>
    <div class="legend">
      <span><div class="dot" style="background:var(--ok);"></div>Livre</span>
      <span><div class="dot" style="background:var(--warn);"></div>Parcial</span>
      <span><div class="dot" style="background:var(--err);"></div>Cheio</span>
      <span><div class="dot" style="background:var(--warn);border:1px solid var(--warn);"></div>Feriado</span>
    </div>
    ${daySection}
    ${pendSection}
  </div>
  ${renderNav('agenda')}
  ${modalOpen?renderModal():''}`;
}

function selectDay(d){ selectedDate=d===selectedDate?null:d; draw(); }
async function prevMonth(){ currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()-1,1); await loadData(); draw(); }
async function nextMonth(){ currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1); await loadData(); draw(); }

function openModal(){ modalOpen=true; modalCat='servico'; modalApprovedId=null; draw(); }
function closeModal(){ modalOpen=false; draw(); }

function renderModal(){
  const approvedOpts=pendingServices.map(q=>`<option value="${q.id}">#${q.sequence}/${q.year} — ${q.customers?.name||'—'}</option>`).join('');
  return`
  <div class="modal-overlay" onclick="closeModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-title">📅 Novo agendamento — ${selectedDate?new Date(selectedDate+'T12:00').toLocaleDateString('pt-BR'):''}</div>

      <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;">Categoria</div>
      <div class="cat-grid">
        <div class="cat-btn ${modalCat==='visita'?'sel':''}" onclick="modalCat='visita';redrawModal()">🚗 Visita técnica</div>
        <div class="cat-btn ${modalCat==='orcamento'?'sel':''}" onclick="modalCat='orcamento';redrawModal()">📋 Orçamento</div>
        <div class="cat-btn ${modalCat==='servico'?'sel':''}" onclick="modalCat='servico';redrawModal()">🔧 Serviço</div>
      </div>

      ${modalCat==='servico'?`
        <div class="fg" style="margin-bottom:10px;">
          <label class="fl">Serviço aprovado *</label>
          <select class="fs" id="mApproved">
            <option value="">Selecione o serviço...</option>
            ${approvedOpts}
          </select>
        </div>`:
        `<div class="fg" style="margin-bottom:10px;">
          <label class="fl">Descrição</label>
          <input class="fi" id="mDesc" placeholder="${modalCat==='visita'?'Ex: Visita técnica — diagnóstico':'Ex: Visitar cliente para orçamento'}">
        </div>`}

      <div class="fr" style="margin-bottom:10px;">
        <div class="fg"><label class="fl">Horário</label>
          <input class="fi" id="mTime" type="time" value="08:00"></div>
        <div class="fg"><label class="fl">Duração est. (h)</label>
          <input class="fi" id="mDur" type="number" value="1" step="0.5" min="0.5" inputmode="decimal"></div>
      </div>

      <div class="fg" style="margin-bottom:14px;"><label class="fl">Observações</label>
        <input class="fi" id="mNotes" placeholder="Materiais necessários, endereço..."></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <button class="btn bs" onclick="closeModal()">Cancelar</button>
        <button class="btn bp" onclick="saveAppt()">✓ Agendar</button>
      </div>
    </div>
  </div>`;
}

function redrawModal(){ draw(); }

async function saveAppt(){
  if(!selectedDate){toast('Selecione uma data','err');return;}
  let quoteId=null, notes='', desc='';
  if(modalCat==='servico'){
    quoteId=parseInt(document.getElementById('mApproved')?.value);
    if(!quoteId){toast('Selecione o serviço','err');return;}
  } else {
    desc=document.getElementById('mDesc')?.value?.trim()||'';
  }
  notes=document.getElementById('mNotes')?.value?.trim()||'';
  const time=document.getElementById('mTime')?.value||null;

  const{error}=await sb.from('appointments').insert([{
    owner_id:currentUser.id,
    scheduled_date:selectedDate,
    scheduled_time:time,
    category:modalCat,
    quote_id:quoteId||null,
    notes:notes||(desc||null),
    created_at:new Date().toISOString(),
  }]);

  if(error){toast('Erro ao agendar: '+error.message,'err');return;}

  // Atualiza status do orçamento para scheduled
  if(quoteId){
    await sb.from('quotes').update({status:'scheduled',updated_at:new Date().toISOString()}).eq('id',quoteId);
    await sb.from('status_logs').insert([{quote_id:quoteId,owner_id:currentUser.id,from_status:'approved',to_status:'scheduled',changed_by:currentUser.id,changed_at:new Date().toISOString()}]);
  }

  toast('Agendado com sucesso!','ok');
  modalOpen=false;
  await loadData(); draw();
}

async function deleteAppt(id){
  if(!confirm('Excluir este agendamento?'))return;
  await sb.from('appointments').delete().eq('id',id);
  toast('Agendamento excluído','ok');
  await loadData(); draw();
}
</script>
</body>
</html>

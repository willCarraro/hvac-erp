<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0F1923">
<title>MeuGestHVAC — Agenda</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 8px;}
.cal-head{text-align:center;font-size:10px;font-weight:700;color:var(--txt2);padding:6px 0;text-transform:uppercase;}
.cal-day{text-align:center;padding:6px 2px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;min-height:36px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;transition:all .2s;}
.cal-day.today{background:rgba(0,191,255,.2);border:1.5px solid var(--acc);color:var(--acc);}
.cal-day.sel{background:var(--acc);color:#0F1923;}
.cal-day.has-free{background:rgba(46,204,113,.12);color:var(--ok);}
.cal-day.has-partial{background:rgba(243,156,18,.12);color:var(--warn);}
.cal-day.has-full{background:rgba(231,76,60,.12);color:var(--err);}
.cal-day.other-month{opacity:.3;}
.day-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;}
.cal-nav button{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);padding:6px 14px;cursor:pointer;font-size:16px;}
.cal-nav h3{font-size:15px;font-weight:700;}
.pending-tag{background:rgba(243,156,18,.15);border:1px solid var(--warn);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.appt-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;}
.appt-time{font-size:12px;color:var(--acc);font-weight:700;margin-bottom:4px;}
.appt-name{font-size:14px;font-weight:600;}
.appt-sub{font-size:11px;color:var(--txt2);margin-top:2px;}
.view-tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.vtab{flex:1;padding:10px;border:none;background:none;color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;}
.vtab.on{color:var(--acc);border-bottom-color:var(--acc);}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin"></div><p>Carregando...</p></div></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let view='month', currentDate=new Date(), selectedDate=null;
let appointments=[], pendingServices=[];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

(async()=>{
  const ok=await requireAuth();if(!ok)return;
  await loadData();
  draw();
})();

async function loadData(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  const from=new Date(y,m,1).toISOString().split('T')[0];
  const to=new Date(y,m+1,0).toISOString().split('T')[0];
  const [{data:apps},{data:pend}]=await Promise.all([
    sb.from('appointments').select('*,services(customer_snapshot,quote_id)').eq('owner_id',currentUser.id).gte('scheduled_date',from).lte('scheduled_date',to).order('scheduled_date').order('scheduled_time'),
    sb.from('quotes').select('id,sequence,year,customers(name)').eq('owner_id',currentUser.id).eq('status','approved'),
  ]);
  appointments=apps||[];
  pendingServices=pend||[];
}

function draw(){
  const y=currentDate.getFullYear(),m=currentDate.getMonth();
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];

  // Map appointments por dia
  const apptByDay={};
  appointments.forEach(a=>{
    if(!apptByDay[a.scheduled_date])apptByDay[a.scheduled_date]=[];
    apptByDay[a.scheduled_date].push(a);
  });

  // Gerar dias do calendário
  let days='';
  // Dias anteriores
  const prevDays=new Date(y,m,0).getDate();
  for(let i=firstDay-1;i>=0;i--){
    days+=`<div class="cal-day other-month">${prevDays-i}</div>`;
  }
  // Dias do mês
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const appts=apptByDay[dateStr]||[];
    const isToday=dateStr===todayStr;
    const isSel=selectedDate===dateStr;
    let cls='cal-day';
    if(isSel)cls+=' sel';
    else if(isToday)cls+=' today';
    else if(appts.length>=4)cls+=' has-full';
    else if(appts.length>=2)cls+=' has-partial';
    else if(appts.length>=1)cls+=' has-free';
    days+=`<div class="${cls}" onclick="selectDay('${dateStr}')">${d}${appts.length?`<span class="day-dot"></span>`:''}</div>`;
  }
  // Dias próximo mês
  const remaining=(7-((firstDay+daysInMonth)%7))%7;
  for(let d=1;d<=remaining;d++) days+=`<div class="cal-day other-month">${d}</div>`;

  // Agenda do dia selecionado
  const selAppts=selectedDate?(apptByDay[selectedDate]||[]):[];
  const daySection=selectedDate?`
    <div class="sec-hdr">
      <div class="sec-title">📅 ${new Date(selectedDate+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}</div>
      <button class="btn bp btn-sm" onclick="newAppt()">+ Agendar</button>
    </div>
    <div style="padding:0 14px;">
      ${selAppts.length?selAppts.map(a=>{
        const snap=a.services?.customer_snapshot||{};
        return `<div class="appt-card">
          <div class="appt-time">${a.scheduled_time?a.scheduled_time.slice(0,5):'Horário a definir'}</div>
          <div class="appt-name">${snap.name||'Cliente'}</div>
          <div class="appt-sub">${a.notes||'Serviço agendado'}</div>
          <div style="display:flex;gap:8px;margin-top:10px;">
            <button class="btn bs btn-sm" onclick="deleteAppt(${a.id})">🗑️ Excluir</button>
          </div>
        </div>`;
      }).join(''):`<div style="font-size:13px;color:var(--txt2);padding:8px 0;">Sem agendamentos neste dia</div>`}
    </div>`:'';

  // Pendentes de agendamento
  const pendSection=pendingServices.length?`
    <div class="sec-hdr" style="margin-top:8px;">
      <div class="sec-title">⏳ Aguardando agendamento</div>
      <span style="font-size:12px;color:var(--warn);">${pendingServices.length}</span>
    </div>
    <div style="padding:0 14px;">
      ${pendingServices.map(q=>`
        <div class="pending-tag" onclick="nav('orcamento.html?id=${q.id}')">
          <div style="font-size:13px;font-weight:700;">📋 #${q.sequence}/${q.year}</div>
          <div style="font-size:12px;color:var(--txt2);">${q.customers?.name||'—'} · Aprovado, aguardando data</div>
        </div>`).join('')}
    </div>`:'';

  document.getElementById('app').innerHTML=`
  <div class="page">
    <div class="hdr"><h1>📅 Agenda</h1></div>
    <div class="view-tabs">
      <button class="vtab on">Mês</button>
    </div>
    <div class="cal-nav">
      <button onclick="prevMonth()">←</button>
      <h3>${MONTHS[m]} ${y}</h3>
      <button onclick="nextMonth()">→</button>
    </div>
    <div class="cal-grid">
      ${DAYS.map(d=>`<div class="cal-head">${d}</div>`).join('')}
      ${days}
    </div>
    <div style="display:flex;gap:10px;padding:12px 14px;font-size:11px;color:var(--txt2);">
      <span style="color:var(--ok);">● Livre</span>
      <span style="color:var(--warn);">● Parcial</span>
      <span style="color:var(--err);">● Cheio</span>
    </div>
    ${daySection}
    ${pendSection}
  </div>
  ${renderNav('agenda')}`;
}

function selectDay(d){selectedDate=d===selectedDate?null:d;draw();}
async function prevMonth(){currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()-1,1);await loadData();draw();}
async function nextMonth(){currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1);await loadData();draw();}

async function newAppt(){
  if(!selectedDate)return;
  const time=prompt('Horário (HH:MM):','08:00');
  const notes=prompt('Observações:','');
  // Para agendar precisa vincular a um serviço — simplificado aqui
  toast('Funcionalidade de agendamento disponível ao aprovar um orçamento','warn',3000);
}

async function deleteAppt(id){
  if(!confirm('Excluir este agendamento?'))return;
  await sb.from('appointments').delete().eq('id',id);
  toast('Agendamento excluído','ok');
  await loadData();draw();
}
</script>
</body>
</html>
